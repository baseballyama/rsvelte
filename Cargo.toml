[package]
name = "svelte-compiler-rust"
version = "0.1.0"
edition = "2024"
rust-version = "1.90"
description = "A high-performance Rust implementation of the Svelte compiler"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["native"]
native = ["rayon", "miette/fancy", "jemalloc"]
trace-fastpath = []
napi = ["dep:napi", "dep:napi-derive", "dep:napi-build"]
jemalloc = ["dep:tikv-jemallocator"]
wasm = ["wasm-bindgen", "console_error_panic_hook", "getrandom/js"]

[dependencies]
# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["preserve_order"] }

# Parallelism (native only)
rayon = { version = "1.10", optional = true }

# Memory efficiency
bumpalo = { version = "3.16", features = ["collections"] }
compact_str = { version = "0.9", features = ["serde"] }
smallvec = { version = "1.13", features = ["serde"] }

# Fast hashing (5-10x faster than std HashMap/HashSet)
rustc-hash = "2.0"

# JavaScript parsing and code generation
oxc_allocator = "0.107"
oxc_parser = "0.107"
oxc_ast = { version = "0.107", features = ["serialize"] }
oxc_span = "0.107"
oxc_diagnostics = "0.107"
oxc_codegen = "0.107"
oxc_syntax = "0.107"

# Error handling
thiserror = "2.0"
miette = "7.4"

# Regex
regex = "1.11"

# Immutable data structures for efficient cloning
im = "15.1"

# SIMD-accelerated string search
memchr = "2.7"

# Fast integer formatting (already a transitive dep, now used directly in codegen)
itoa = "1"

# Source map handling
sourcemap = "9.0"

# File system
walkdir = "2.5"

# Time
chrono = "0.4"

# N-API support (optional)
napi = { version = "2", default-features = false, features = ["napi9", "serde-json"], optional = true }
napi-derive = { version = "2", optional = true }

# WASM support (optional)
wasm-bindgen = { version = "0.2", optional = true }
console_error_panic_hook = { version = "0.1", optional = true }
getrandom = { version = "0.2", optional = true }
lazy_static = "1.5.0"
indexmap = { version = "2.13.0", features = ["serde"] }
oxc_ast_visit = "0.107"

# Better multi-threaded memory allocator (optional, Unix/Mac only)
[target.'cfg(all(not(windows), not(target_arch = "wasm32")))'.dependencies]
tikv-jemallocator = { version = "0.6", optional = true }

[build-dependencies]
napi-build = { version = "2", optional = true }

[dev-dependencies]
# Testing
insta = { version = "1.42", features = ["json", "glob"] }
pretty_assertions = "1.4"
criterion = { version = "0.5", features = ["html_reports"] }
test-generator = "0.3"
glob = "0.3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[[bin]]
name = "test_reporter"
path = "src/bin/test_reporter.rs"

[[bin]]
name = "benchmark_runner"
path = "src/bin/benchmark_runner.rs"

[[bin]]
name = "profiler"
path = "src/bin/profiler.rs"

[[bin]]
name = "parse_profile"
path = "src/bin/parse_profile.rs"

[[bin]]
name = "samply_target"
path = "src/bin/samply_target.rs"

[[bin]]
name = "oxc_call_counter"
path = "src/bin/oxc_call_counter.rs"

[[bin]]
name = "parse_bottleneck"
path = "src/bin/parse_bottleneck.rs"

[[bin]]
name = "fastpath_coverage"
path = "src/bin/fastpath_coverage.rs"

[[bench]]
name = "parser"
harness = false

[[bench]]
name = "compiler"
harness = false

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[profile.release]
lto = "fat"
codegen-units = 1
opt-level = 3
strip = false
debug = false
panic = "abort"

[profile.bench]
inherits = "release"
debug = true
panic = "unwind"  # Criterion requires unwind for catching panics
