[package]
name = "svelte-compiler-rust"
version = "0.1.0"
edition = "2024"
rust-version = "1.90"
description = "A high-performance Rust implementation of the Svelte compiler"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["native"]
native = ["rayon", "miette/fancy"]
wasm = ["wasm-bindgen", "console_error_panic_hook", "getrandom/js"]

[dependencies]
# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["preserve_order"] }

# Parallelism (native only)
rayon = { version = "1.10", optional = true }

# Memory efficiency
bumpalo = { version = "3.16", features = ["collections"] }
compact_str = { version = "0.8", features = ["serde"] }

# JavaScript parsing and code generation
oxc_allocator = "0.107"
oxc_parser = "0.107"
oxc_ast = { version = "0.107", features = ["serialize"] }
oxc_span = "0.107"
oxc_diagnostics = "0.107"
oxc_codegen = "0.107"
oxc_syntax = "0.107"

# Error handling
thiserror = "2.0"
miette = "7.4"

# Regex
regex = "1.11"

# Source map handling
sourcemap = "9.0"

# File system
walkdir = "2.5"

# Time
chrono = "0.4"

# WASM support (optional)
wasm-bindgen = { version = "0.2", optional = true }
console_error_panic_hook = { version = "0.1", optional = true }
getrandom = { version = "0.2", optional = true }
lazy_static = "1.5.0"

[dev-dependencies]
# Testing
insta = { version = "1.42", features = ["json", "glob"] }
pretty_assertions = "1.4"
criterion = { version = "0.5", features = ["html_reports"] }
test-generator = "0.3"
glob = "0.3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[[bin]]
name = "test_reporter"
path = "src/bin/test_reporter.rs"

[[bin]]
name = "benchmark_runner"
path = "src/bin/benchmark_runner.rs"

[[bench]]
name = "parser"
harness = false

[profile.release]
lto = true
codegen-units = 1

[profile.bench]
inherits = "release"
debug = true
