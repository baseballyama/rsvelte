name: C ABI

# Tests the C FFI surface on Linux, macOS, and Windows:
#  - Build the cdylib + verify the committed include/rsvelte.h matches
#    fresh cbindgen output (RSVELTE_CAPI_CHECK_HEADER=1). Breaking
#    changes to RsvelteBuf / extern signatures will fail this step.
#  - Run the Rust integration tests under crates/rsvelte_capi/tests/.
#    Covers JSON envelope shape, every documented CompileOption, and
#    rsvelte_compile_module. These tests fail loudly if any FFI-related
#    surface (JSON keys, option names, envelope structure) changes
#    without explicit acknowledgement.
#  - Run the C / Go / Python / Ruby / Zig smoke tests where the
#    runner has the toolchain.
#  - Upload the per-OS shared library and the generated header as
#    workflow artifacts so downstream consumers can grab them.

on:
  push:
    branches: [main]
    paths:
      - 'crates/rsvelte_capi/**'
      - 'crates/rsvelte_core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/capi.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/rsvelte_capi/**'
      - 'crates/rsvelte_core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/capi.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # The default `release` profile uses `lto = "fat"` + `codegen-units = 1` — a
  # whole-program optimization pass that runs on every build and cannot be
  # cached, so even with the oxc dependency graph restored from cache each capi
  # build re-LTOs the entire program (the bulk of the 9–22 min per-OS times).
  # capi's job is ABI correctness (header drift, envelope/option/module tests,
  # real `cc`/FFI linkage), none of which depends on optimization level, so turn
  # LTO off and split codegen for CI. This mirrors the `compatibility-report`
  # job's `CARGO_PROFILE_RELEASE_LTO=off`. The published release artifacts (the
  # `Release` workflow) keep full fat-LTO.
  CARGO_PROFILE_RELEASE_LTO: "off"
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"

jobs:
  # Windows is dropped from the PR matrix: even with LTO off, a warm Windows
  # release build of the oxc graph + capi runs ~5.4 min (Windows link/codegen is
  # the slowest target), over the PR feedback budget. ubuntu + macos cover the
  # ABI on every PR (cargo tests + real C linkage), and the full three-OS matrix
  # still runs on push to `main` and on demand, so a Windows-specific ABI
  # regression is caught before the next release. Mirrors CI dropping macOS from
  # its PR test matrix.
  capi:
    name: C ABI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      # The OS list is computed inline via a parse-time conditional rather than
      # in a separate `set-matrix` job: that job added a full job's queue +
      # startup (~1 min) to the serial path before any build could begin. This
      # expression is evaluated at workflow-parse time so the matrix legs start
      # immediately (mirrors the `test` job in ci.yml). PRs drop Windows (see the
      # comment above); pushes and manual runs get all three OSes.
      matrix:
        include: ${{ github.event_name == 'pull_request'
          && fromJSON('[{"os":"ubuntu-latest","lib":"librsvelte_capi.so","exe_ext":""},{"os":"macos-latest","lib":"librsvelte_capi.dylib","exe_ext":""}]')
          || fromJSON('[{"os":"ubuntu-latest","lib":"librsvelte_capi.so","exe_ext":""},{"os":"macos-latest","lib":"librsvelte_capi.dylib","exe_ext":""},{"os":"windows-latest","lib":"rsvelte_capi.dll","exe_ext":".exe"}]') }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: false

      # capi only needs the `svelte` submodule: rsvelte_core's build.rs
      # reads submodules/svelte/packages/svelte/package.json to embed the
      # version string in the disclose-version import. The other three
      # submodules (language-tools, typescript-go, vite-plugin-svelte —
      # ~534 MB combined) are never touched by the capi build/tests, and
      # vite-plugin-svelte is an SSH-only remote. Shallow-init just svelte
      # to keep the uploaded library's version accurate.
      - name: Checkout svelte submodule (shallow)
        run: git submodule update --init --depth 1 submodules/svelte

      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0

      # Without this every run recompiles the whole oxc_* dependency graph
      # in release mode from scratch (the bulk of the build time). The
      # cache is keyed per-OS and shared across this workflow's runs
      # (incl. main pushes) so PR builds restore the prebuilt deps.
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: capi-${{ matrix.os }}

      # Build twice on purpose: the first run regenerates the header
      # into include/rsvelte.h (build script writes when env var unset),
      # the second run *verifies* the committed header is identical to
      # what cbindgen produces. We keep them separate to surface clear
      # error messages.
      - name: Build cdylib
        run: cargo build -p rsvelte_capi --release

      - name: Verify header is up-to-date (RSVELTE_CAPI_CHECK_HEADER=1)
        env:
          RSVELTE_CAPI_CHECK_HEADER: '1'
        run: cargo build -p rsvelte_capi --release

      - name: Verify no uncommitted header drift
        # Belt-and-braces: even if the build script were bypassed, this
        # surfaces drift via git.
        shell: bash
        run: |
          if ! git diff --exit-code crates/rsvelte_capi/include/rsvelte.h; then
            echo "::error::crates/rsvelte_capi/include/rsvelte.h drifted — re-run \`cargo build -p rsvelte_capi\` and commit the result."
            exit 1
          fi

      - name: Run cargo tests (envelope, options, header, module, memory)
        run: cargo test -p rsvelte_capi --release

      # ---------------- C smoke ----------------
      - name: C smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cc -O2 -Wall -Wextra \
            -I crates/rsvelte_capi/include \
            -L target/release \
            crates/rsvelte_capi/examples/c/smoke.c \
            -lrsvelte_capi \
            -o target/release/c_smoke
          cd target/release
          # Same dir for binary + dylib — both env vars cover Linux/macOS.
          LD_LIBRARY_PATH=. DYLD_LIBRARY_PATH=. ./c_smoke

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: C smoke (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cl /nologo /O2 ^
            /I crates\rsvelte_capi\include ^
            crates\rsvelte_capi\examples\c\smoke.c ^
            /link /LIBPATH:target\release rsvelte_capi.dll.lib ^
            /OUT:target\release\c_smoke.exe
          if errorlevel 1 exit /b 1
          target\release\c_smoke.exe

      # The polyglot FFI smokes below (Go / Python / Ruby / PHP / Java) each
      # pull in a language toolchain — collectively ~2-3 min of setup. The C
      # ABI itself is already gated on every PR across all three OS by the
      # `cargo test` step above (envelope / options / header / module / memory)
      # plus the C smoke (real `cc` linkage). So to keep PR feedback fast, the
      # cross-language smokes run only on push to `main` and on manual dispatch;
      # they confirm the ABI stays callable from each FFI host before a release.
      # ---------------- Go ----------------
      # cgo on Windows needs MinGW/gcc on PATH, which the default
      # runner doesn't have — skip Windows here; the Rust cargo tests
      # cover the Windows ABI surface.
      - name: Set up Go
        if: github.event_name != 'pull_request' && runner.os != 'Windows'
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26'

      - name: Go smoke
        if: github.event_name != 'pull_request' && runner.os != 'Windows'
        shell: bash
        run: |
          cd crates/rsvelte_capi/examples/go
          go run .

      # ---------------- Python ----------------
      - name: Set up Python
        if: github.event_name != 'pull_request'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.14'

      - name: Python smoke
        if: github.event_name != 'pull_request'
        shell: bash
        run: python3 crates/rsvelte_capi/examples/python/smoke.py

      # ---------------- Ruby ----------------
      - name: Set up Ruby
        if: github.event_name != 'pull_request'
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: '4.0.6'

      - name: Ruby smoke
        if: github.event_name != 'pull_request'
        shell: bash
        run: ruby crates/rsvelte_capi/examples/ruby/smoke.rb

      # ---------------- Zig ----------------
      # Zig smoke is locally verified (see crates/rsvelte_capi/examples/zig/smoke.zig)
      # but currently not run in CI: mlugg/setup-zig@v1's mirror set
      # repeatedly returns 404/503 for both 0.16.0 and 0.15.1, and
      # ziglang.org/builds itself answered 404 in the same run. The
      # cargo tests + the other language smokes already cover the C ABI
      # surface; Zig will rejoin once setup-zig stabilises.

      # ---------------- PHP ----------------
      - name: Set up PHP
        if: github.event_name != 'pull_request' && runner.os != 'Windows'
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.3'
          extensions: ffi
          ini-values: ffi.enable=true

      - name: PHP smoke
        if: github.event_name != 'pull_request' && runner.os != 'Windows'
        shell: bash
        run: php -d ffi.enable=true crates/rsvelte_capi/examples/php/smoke.php

      # ---------------- Java FFM (JDK 22+) ----------------
      - name: Set up JDK 22
        if: github.event_name != 'pull_request'
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '22'

      - name: Java FFM smoke
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          java --enable-native-access=ALL-UNNAMED \
            crates/rsvelte_capi/examples/java/Smoke.java

      # ---------------- Artifacts ----------------
      - name: Upload shared library
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rsvelte_capi-${{ matrix.os }}
          path: |
            target/release/${{ matrix.lib }}
            crates/rsvelte_capi/include/rsvelte.h
          if-no-files-found: error
