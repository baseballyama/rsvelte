name: Release

on:
  push:
    branches: [main]

# Required by changesets/action: write to contents (commit version PR, push tags),
# write to pull-requests (open the "Version Packages" PR), and id-token: write
# is left available so we can opt into npm provenance later if desired.
permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  # Only the "Version Packages" merge (the publish run) cancels older queued
  # runs. This kills any in-flight regular-commit run that is about to
  # re-open the version PR on stale state (the race that produced #554).
  # Regular pushes keep cancel-in-progress: false so they never abort an
  # in-flight publish — npm publish is per-package, so a mid-flight cancel
  # can leave us with versions bumped in package.json but never published
  # to the registry.
  # The expression is quoted so the literal colon in the predicate
  # string ('chore(release): version packages') doesn't confuse the
  # YAML parser. GitHub Actions still evaluates `${{ }}` inside the
  # string and `cancel-in-progress` accepts the resulting `'true'` /
  # `'false'` literal.
  cancel-in-progress: "${{ startsWith(github.event.head_commit.message, 'chore(release): version packages') }}"

jobs:
  # Fast path: open / refresh the "Version Packages" PR. The version cycle
  # never stages binaries (changeset version only bumps package.json/CHANGELOG
  # and mirrors the version into Cargo.toml/Cargo.lock as text), so this job
  # has NO dependency on the binary build matrix. Decoupling it means a flaky
  # crates.io download in one build leg can no longer block the version PR
  # from being created — the failure that produced run 27058363504.
  #
  # Runs on every push to main EXCEPT the "Version Packages" merge itself —
  # that commit consumes the changesets and triggers the `publish` job below.
  version-pr:
    name: Version PR
    if: "${{ !startsWith(github.event.head_commit.message, 'chore(release): version packages') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so changesets can read the merge base when computing
          # which packages need releasing.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # No `publish` input on purpose — this job ONLY ever opens/refreshes the
      # version PR. When there are no changesets it is a no-op. Publishing is
      # handled by the `publish` job once the version PR is merged.
      - name: Create or refresh Release Pull Request
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          # changeset version (bump versions, write CHANGELOG)
          # + sync-version.mjs (mirror the bump into Cargo.toml/Cargo.lock)
          version: pnpm run version-packages
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Per-platform svelte-check binary builds. Each job uploads its rsvelte
  # `svelte-check` artifact; the `release` job below downloads them all and
  # stages them into the corresponding `apps/npm/svelte-check-<triple>/` package
  # directory before `changeset publish` runs. On the "Version Packages" PR
  # cycle the staged binaries are unused — that's expected; we trade a few
  # CI minutes for not having to detect publish vs. version-PR up front.
  build-svelte-check:
    name: Build svelte-check (${{ matrix.triple }})
    # Only the publish path needs binaries staged; gate every build leg to the
    # "Version Packages" merge commit so regular pushes skip them entirely.
    if: "${{ startsWith(github.event.head_commit.message, 'chore(release): version packages') }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin, triple: darwin-arm64, ext: '' }
          - { os: macos-latest, target: x86_64-apple-darwin, triple: darwin-x64, ext: '' }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, triple: linux-x64-gnu, ext: '' }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, triple: linux-arm64-gnu, ext: '', apt: gcc-aarch64-linux-gnu, linker: aarch64-linux-gnu-gcc }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, triple: win32-x64-msvc, ext: '.exe' }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install cross-compile linker
        if: matrix.apt
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Build svelte-check
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --profile dist --bin svelte_check --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p stage
          # cargo writes the binary as the bin's `name` field (`svelte_check`,
          # with an underscore — Cargo doesn't translate the filename), but we
          # ship it under the user-facing `svelte-check` name.
          cp "target/${{ matrix.target }}/dist/svelte_check${{ matrix.ext }}" \
             "stage/svelte-check${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: svelte-check-${{ matrix.triple }}
          path: stage/svelte-check${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 7

  # Per-platform NAPI `.node` builds for @rsvelte/vite-plugin-svelte-native.
  # Mirrors `build-svelte-check` but builds the crate's cdylib with the `napi`
  # feature enabled, renames the platform dylib to `rsvelte.node`, and uploads
  # it for the release job to stage into the matching platform package.
  build-vps-native:
    name: Build vps-native (${{ matrix.triple }})
    if: "${{ startsWith(github.event.head_commit.message, 'chore(release): version packages') }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin, triple: darwin-arm64, dylib: librsvelte_core.dylib }
          - { os: macos-latest, target: x86_64-apple-darwin, triple: darwin-x64, dylib: librsvelte_core.dylib }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, triple: linux-x64-gnu, dylib: librsvelte_core.so }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, triple: linux-arm64-gnu, dylib: librsvelte_core.so, apt: gcc-aarch64-linux-gnu, linker: aarch64-linux-gnu-gcc }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, triple: win32-x64-msvc, dylib: rsvelte_core.dll }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install cross-compile linker
        if: matrix.apt
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Build NAPI cdylib
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.linker }}
        run: cargo build --profile dist --features napi --lib --target ${{ matrix.target }}

      - name: Stage .node binary
        shell: bash
        run: |
          mkdir -p stage
          cp "target/${{ matrix.target }}/dist/${{ matrix.dylib }}" stage/rsvelte.node

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vps-native-${{ matrix.triple }}
          path: stage/rsvelte.node
          if-no-files-found: error
          retention-days: 7

  # Per-platform rsvelte-fmt CLI builds for @rsvelte/fmt. Mirrors
  # `build-svelte-check`; the bin is already named `rsvelte-fmt` (Cargo
  # `[[bin]] name = "rsvelte-fmt"`), so no underscore rename is needed.
  build-rsvelte-fmt:
    name: Build rsvelte-fmt (${{ matrix.triple }})
    if: "${{ startsWith(github.event.head_commit.message, 'chore(release): version packages') }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin, triple: darwin-arm64, ext: '' }
          - { os: macos-latest, target: x86_64-apple-darwin, triple: darwin-x64, ext: '' }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, triple: linux-x64-gnu, ext: '' }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, triple: linux-arm64-gnu, ext: '', apt: gcc-aarch64-linux-gnu, linker: aarch64-linux-gnu-gcc }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, triple: win32-x64-msvc, ext: '.exe' }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install cross-compile linker
        if: matrix.apt
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Build rsvelte-fmt
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --profile dist --bin rsvelte-fmt --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p stage
          cp "target/${{ matrix.target }}/dist/rsvelte-fmt${{ matrix.ext }}" \
             "stage/rsvelte-fmt${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rsvelte-fmt-${{ matrix.triple }}
          path: stage/rsvelte-fmt${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 7

  # Per-platform rsvelte-lint CLI builds for @rsvelte/lint. Mirrors
  # `build-rsvelte-fmt`; the bin is already named `rsvelte-lint` (Cargo
  # `[[bin]] name = "rsvelte-lint"`), so no underscore rename is needed. Unlike
  # the other CLIs this uses `--profile dist-lint` (NOT `dist`): the linter
  # isolates a per-file compiler panic via `catch_unwind`, which only works when
  # the binary UNWINDS. `dist` sets `panic = "abort"`, turning that isolation
  # into a whole-run SIGABRT; `dist-lint` keeps dist's opt/strip but restores
  # unwinding. The output lives under `target/<target>/dist-lint/`.
  build-rsvelte-lint:
    name: Build rsvelte-lint (${{ matrix.triple }})
    if: "${{ startsWith(github.event.head_commit.message, 'chore(release): version packages') }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin, triple: darwin-arm64, ext: '', dylib: librsvelte_lint.dylib }
          - { os: macos-latest, target: x86_64-apple-darwin, triple: darwin-x64, ext: '', dylib: librsvelte_lint.dylib }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, triple: linux-x64-gnu, ext: '', dylib: librsvelte_lint.so }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, triple: linux-arm64-gnu, ext: '', apt: gcc-aarch64-linux-gnu, linker: aarch64-linux-gnu-gcc, dylib: librsvelte_lint.so }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, triple: win32-x64-msvc, ext: '.exe', dylib: rsvelte_lint.dll }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install cross-compile linker
        if: matrix.apt
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Build rsvelte-lint
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --profile dist-lint --bin rsvelte-lint --target ${{ matrix.target }}

      # The NAPI `.node` addon (the engine embedded by @rsvelte/oxlint-plugin's
      # native path) ships in the same @rsvelte/lint-<triple> package. Built with
      # `--profile dist-lint` (unwind) so napi-rs converts a per-file panic into a
      # JS error rather than aborting the host process; `-p rsvelte_lint` keeps
      # `--features napi` scoped to this crate (rsvelte_core also has a `napi`
      # feature). CC needed for the aarch64-linux jemalloc build.
      - name: Build rsvelte-lint NAPI addon
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.linker }}
        run: cargo build --profile dist-lint --features napi --lib -p rsvelte_lint --target ${{ matrix.target }}

      - name: Stage binary + addon
        shell: bash
        run: |
          mkdir -p stage
          cp "target/${{ matrix.target }}/dist-lint/rsvelte-lint${{ matrix.ext }}" \
             "stage/rsvelte-lint${{ matrix.ext }}"
          cp "target/${{ matrix.target }}/dist-lint/${{ matrix.dylib }}" \
             "stage/rsvelte_lint.node"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rsvelte-lint-${{ matrix.triple }}
          path: stage/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish
    # Publish only runs on the "Version Packages" merge commit, once the
    # version PR (opened by `version-pr` above) has been merged and the
    # changesets consumed. This is the only path that needs staged binaries.
    if: "${{ startsWith(github.event.head_commit.message, 'chore(release): version packages') }}"
    runs-on: ubuntu-latest
    needs: [build-svelte-check, build-vps-native, build-rsvelte-fmt, build-rsvelte-lint]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so changesets can read the merge base when computing
          # which packages need releasing.
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # npm OIDC trusted publishing requires npm >= 11.5.1. Node 22 ships an
      # older bundled npm, so pin to a known-good version that supports
      # `npm publish` against a Trusted Publisher with no NPM_TOKEN.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download platform artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          # `pattern` matches both svelte-check-* and vps-native-* uploads —
          # each artifact is unpacked into `artifacts/<name>/`.
          pattern: '*'
          path: artifacts

      - name: Stage svelte-check binaries
        run: pnpm run stage-svelte-check

      - name: Stage rsvelte-fmt binaries
        run: pnpm run stage-fmt

      - name: Stage rsvelte-lint binaries
        run: pnpm run stage-lint

      - name: Stage vps-native binaries
        run: pnpm run stage-vps-native

      # Authentication: every publish in this job (changesets/action's
      # `changeset publish`, and the bare `npm publish` in
      # publish-platform-binaries.mjs) goes through npm OIDC trusted
      # publishing. Each @rsvelte package needs a Trusted Publisher config
      # on npmjs.com pointing at this repo + workflow. No NPM_TOKEN is set
      # on purpose — writing an empty token to ~/.npmrc silently disables
      # the OIDC fallback.
      - name: Publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          # On the "Version Packages" merge there are no changesets left, so
          # changesets/action takes the publish path and runs this script:
          # sync-version.mjs (version → Cargo.toml / Cargo.lock),
          # wasm-pack build (regenerates pkg/ with the new version),
          # finalize-pkg.mjs (rewrites pkg/package.json to @rsvelte/compiler),
          # changeset publish (pnpm publish all workspace packages).
          # No `version` input here — version bumping happens in the separate
          # `version-pr` job, decoupled from the binary builds this job needs.
          publish: pnpm run release
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
