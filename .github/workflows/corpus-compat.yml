name: Corpus Compat

# Compiles every .svelte / .svelte.(js|ts) source (including markdown code
# blocks) from every corpus source repository — sveltejs/svelte, sveltejs/
# svelte.dev, and the real-world projects bits-ui / flowbite-svelte / melt-ui /
# shadcn-svelte, each pinned by its submodule gitlink (see
# scripts/compat-corpus/corpus-sources.json) — with BOTH the official Svelte
# compiler and rsvelte, for client (CSR) and server (SSR) targets, normalizes
# both output trees with oxfmt, and requires the results to be byte-identical.
# The same corpus also drives a svelte2tsx TSX output-parity check (official
# svelte2tsx from submodules/language-tools vs rsvelte's port). See
# scripts/compat-corpus/README.md.
#
# Expected outputs are regenerated from the pinned upstreams on every run, so
# bumping any submodule (auto-update-svelte.yml for the compiler,
# auto-update-submodules.yml for svelte.dev and the real-world projects)
# automatically refreshes both the test corpus and its expectations.
#
# The fmt-parity job additionally formats every .svelte component with both
# rsvelte-fmt and the oxfmt(`svelte: true`) oracle (prettier-plugin-svelte for
# the structure + oxc for embedded JS/CSS — rsvelte-fmt's exact layering) and
# requires byte-identical output, ratcheted by compatibility/fmt-known-failures.json.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'scripts/compat-corpus/**'
      - 'scripts/fixtures/fmt-corpus.oxfmtrc.json'
      - 'pnpm-lock.yaml'
      - 'compatibility/**'
      - 'submodules/svelte'
      - 'submodules/svelte.dev'
      - 'submodules/language-tools'
      - 'submodules/bits-ui'
      - 'submodules/flowbite-svelte'
      - 'submodules/melt-ui'
      - 'submodules/shadcn-svelte'
      - 'submodules/sveltestrap'
      - 'submodules/attractions'
      - 'submodules/svelte-ux'
      - 'submodules/smelte'
      - 'submodules/svar-core'
      - 'submodules/svelte-table'
      - 'submodules/powertable'
      - 'submodules/svelte-pivottable'
      - 'submodules/svelte-toast'
      - 'submodules/svelte-sonner'
      - 'submodules/svelte-notifications'
      - 'submodules/svelte-fa'
      - 'submodules/svelte-heroicons'
      - 'submodules/svelte-calendar'
      - 'submodules/date-picker-svelte'
      - 'submodules/svelte-maplibre'
      - 'submodules/layercake'
      - 'submodules/layerchart'
      - 'submodules/svelte-splitpanes'
      - 'submodules/svelte-stepper'
      - 'submodules/svelte-formly'
      - 'submodules/svelte-form-builder'
      - 'submodules/svelte-checkbox'
      - 'submodules/svelte-toggle'
      - 'submodules/svelthree'
      - 'submodules/cmsaasstarter'
      - 'scripts/compat-corpus/corpus-sources.json'
      - '.gitmodules'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/corpus-compat.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'scripts/compat-corpus/**'
      - 'scripts/fixtures/fmt-corpus.oxfmtrc.json'
      - 'pnpm-lock.yaml'
      - 'compatibility/**'
      - 'submodules/svelte'
      - 'submodules/svelte.dev'
      - 'submodules/language-tools'
      - 'submodules/bits-ui'
      - 'submodules/flowbite-svelte'
      - 'submodules/melt-ui'
      - 'submodules/shadcn-svelte'
      - 'submodules/sveltestrap'
      - 'submodules/attractions'
      - 'submodules/svelte-ux'
      - 'submodules/smelte'
      - 'submodules/svar-core'
      - 'submodules/svelte-table'
      - 'submodules/powertable'
      - 'submodules/svelte-pivottable'
      - 'submodules/svelte-toast'
      - 'submodules/svelte-sonner'
      - 'submodules/svelte-notifications'
      - 'submodules/svelte-fa'
      - 'submodules/svelte-heroicons'
      - 'submodules/svelte-calendar'
      - 'submodules/date-picker-svelte'
      - 'submodules/svelte-maplibre'
      - 'submodules/layercake'
      - 'submodules/layerchart'
      - 'submodules/svelte-splitpanes'
      - 'submodules/svelte-stepper'
      - 'submodules/svelte-formly'
      - 'submodules/svelte-form-builder'
      - 'submodules/svelte-checkbox'
      - 'submodules/svelte-toggle'
      - 'submodules/svelthree'
      - 'submodules/cmsaasstarter'
      - 'scripts/compat-corpus/corpus-sources.json'
      - '.gitmodules'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/corpus-compat.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # The NAPI build is the whole job's bottleneck (~5 min of the ~6 min total):
  # the default `release` profile's `lto = "fat"` + `codegen-units = 1` runs an
  # uncacheable whole-program pass every time, while the actual corpus compile +
  # verify over 6,400+ entries takes only ~0.2 min. Turning LTO off and splitting
  # codegen cuts the build sharply; the resulting compiler binary is marginally
  # slower per file but the run is already negligible, so the net is a large win.
  # Mirrors the `compatibility-report` job; release artifacts keep fat-LTO.
  CARGO_PROFILE_RELEASE_LTO: "off"
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"

jobs:
  corpus:
    name: Compiler parity
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Checkout corpus source submodules (shallow)
        run: git submodule update --init --depth 1 submodules/svelte submodules/svelte.dev submodules/language-tools submodules/bits-ui submodules/flowbite-svelte submodules/melt-ui submodules/shadcn-svelte submodules/sveltestrap submodules/attractions submodules/svelte-ux submodules/smelte submodules/svar-core submodules/svelte-table submodules/powertable submodules/svelte-pivottable submodules/svelte-toast submodules/svelte-sonner submodules/svelte-notifications submodules/svelte-fa submodules/svelte-heroicons submodules/svelte-calendar submodules/date-picker-svelte submodules/svelte-maplibre submodules/layercake submodules/layerchart submodules/svelte-splitpanes submodules/svelte-stepper submodules/svelte-formly submodules/svelte-form-builder submodules/svelte-checkbox submodules/svelte-toggle submodules/svelthree submodules/cmsaasstarter

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install root dependencies (oxfmt)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Resolve Svelte submodule SHA
        id: svelte-sha
        run: echo "sha=$(git submodule status submodules/svelte | awk '{print $1}' | sed 's/^[+-]//')" >> "$GITHUB_OUTPUT"

      - name: Cache Svelte compiler dependencies
        id: svelte-deps-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            submodules/svelte/node_modules
            submodules/svelte/packages/svelte/node_modules
          key: corpus-svelte-deps-v1-${{ runner.os }}-${{ steps.svelte-sha.outputs.sha }}-${{ hashFiles('submodules/svelte/pnpm-lock.yaml') }}

      - name: Install Svelte compiler dependencies
        if: steps.svelte-deps-cache.outputs.cache-hit != 'true'
        run: |
          cd submodules/svelte
          pnpm install --frozen-lockfile

      - name: Build official svelte2tsx (parsing with the mirrored svelte)
        # Built fresh every run (not cached): pnpm's node_modules links into a
        # content-addressable store, which actions/cache cannot round-trip
        # intact — a restored cache loses runtime deps like `dedent-js`. The
        # build is cheap, so correctness beats caching here.
        run: |
          cd submodules/language-tools
          pnpm install --frozen-lockfile --ignore-scripts
          # svelte2tsx parses with whatever `svelte/compiler` it resolves; pin it
          # to the exact svelte rsvelte mirrors so the TSX oracle is generated
          # by the same parser (otherwise the v4 dev-dep rejects Svelte-5 syntax).
          SV=$(node -p "require('../svelte/packages/svelte/package.json').version")
          pnpm --filter svelte2tsx add -D "svelte@$SV"
          pnpm --filter svelte2tsx build

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # The release NAPI build compiles oxc from a git rev — ~15 min cold.
          # rust-cache skips saving on a failed job by default, so a single
          # timeout/failure left the cache cold forever and every later run
          # recompiled from scratch and could time out again. Saving on failure
          # preserves the compiled `target/` and breaks that deadlock (mirrors
          # the same fix in benchmark.yml).
          cache-on-failure: true

      - name: Build rsvelte NAPI binding
        run: |
          cargo build --release --features napi --lib
          mkdir -p .corpus-cache
          cp target/release/librsvelte_core.so .corpus-cache/rsvelte.node

      - name: Collect corpus
        run: node scripts/compat-corpus/collect.mjs

      - name: Compile corpus (official svelte + rsvelte, CSR + SSR)
        run: node scripts/compat-corpus/compile.mjs

      - name: Verify (oxfmt-normalized outputs must be identical)
        run: node scripts/compat-corpus/verify.mjs

      - name: Convert corpus to TSX (official svelte2tsx + rsvelte)
        run: node scripts/compat-corpus/svelte2tsx-compile.mjs

      - name: Verify svelte2tsx (oxfmt-normalized TSX must be identical)
        run: node scripts/compat-corpus/svelte2tsx-verify.mjs

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: corpus-report
          path: |
            compatibility/report.json
            compatibility/report-s2t.json
            compatibility/manifest.json
          if-no-files-found: ignore
          retention-days: 14

  fmt-parity:
    name: Formatter parity
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Checkout corpus source submodules (shallow)
        run: git submodule update --init --depth 1 submodules/svelte submodules/svelte.dev submodules/bits-ui submodules/flowbite-svelte submodules/melt-ui submodules/shadcn-svelte submodules/sveltestrap submodules/attractions submodules/svelte-ux submodules/smelte submodules/svar-core submodules/svelte-table submodules/powertable submodules/svelte-pivottable submodules/svelte-toast submodules/svelte-sonner submodules/svelte-notifications submodules/svelte-fa submodules/svelte-heroicons submodules/svelte-calendar submodules/date-picker-svelte submodules/svelte-maplibre submodules/layercake submodules/layerchart submodules/svelte-splitpanes submodules/svelte-stepper submodules/svelte-formly submodules/svelte-form-builder submodules/svelte-checkbox submodules/svelte-toggle submodules/svelthree submodules/cmsaasstarter

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install root dependencies (oxfmt)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build rsvelte-fmt
        run: cargo build --release -p rsvelte_fmt

      - name: Collect corpus
        run: node scripts/compat-corpus/collect.mjs

      - name: Resolve corpus pins
        id: pins
        # One combined hash over every corpus source submodule SHA, so a bump to
        # any source (svelte, svelte.dev, or a real-world project) invalidates the
        # cached fmt oracle.
        run: |
          echo "sources=$(git submodule status submodules/svelte submodules/svelte.dev submodules/bits-ui submodules/flowbite-svelte submodules/melt-ui submodules/shadcn-svelte submodules/sveltestrap submodules/attractions submodules/svelte-ux submodules/smelte submodules/svar-core submodules/svelte-table submodules/powertable submodules/svelte-pivottable submodules/svelte-toast submodules/svelte-sonner submodules/svelte-notifications submodules/svelte-fa submodules/svelte-heroicons submodules/svelte-calendar submodules/date-picker-svelte submodules/svelte-maplibre submodules/layercake submodules/layerchart submodules/svelte-splitpanes submodules/svelte-stepper submodules/svelte-formly submodules/svelte-form-builder submodules/svelte-checkbox submodules/svelte-toggle submodules/svelthree submodules/cmsaasstarter | awk '{print $1}' | sort | git hash-object --stdin)" >> "$GITHUB_OUTPUT"

      # The oracle depends only on the pins + oxfmt version + oracle config, so
      # cache it: only the first run per pin pays the ~6k oxfmt invocations.
      - name: Cache fmt oracle
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            compatibility/fmt/oracle
            compatibility/fmt/meta.json
          key: corpus-fmt-oracle-v1-${{ runner.os }}-${{ steps.pins.outputs.sources }}-${{ hashFiles('scripts/fixtures/fmt-corpus.oxfmtrc.json', 'pnpm-lock.yaml') }}

      - name: Build fmt trees (oracle cached, actual via rsvelte-fmt)
        run: node scripts/compat-corpus/fmt.mjs

      - name: Verify formatter parity (ratchet, byte-identical)
        run: node scripts/compat-corpus/fmt-verify.mjs

      - name: Upload fmt report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: corpus-fmt-report
          path: |
            compatibility/fmt-report.json
            compatibility/fmt/meta.json
          if-no-files-found: ignore
          retention-days: 14

  lint-parity:
    name: Lint parity (eslint-plugin-svelte)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Checkout lint-corpus submodules (shallow)
        # eslint-plugin-svelte + svelte-eslint-parser supply the rule/parser
        # fixtures; the real-world component libraries (bits-ui / flowbite-svelte
        # / melt-ui / shadcn-svelte — the same pins the compile corpus uses) add
        # production-source breadth.
        run: git submodule update --init --depth 1 submodules/eslint-plugin-svelte submodules/svelte-eslint-parser submodules/bits-ui submodules/flowbite-svelte submodules/melt-ui submodules/shadcn-svelte

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build rsvelte-lint
        # `--profile dist-lint` (release optimization + `panic = "unwind"`) so the
        # CLI's per-file `catch_unwind` isolation actually holds when a single
        # corpus file makes the compiler panic — the shared release/dist profiles
        # use `panic = "abort"`, which would SIGABRT the whole ~12k-file run.
        run: cargo build --profile dist-lint --bin rsvelte-lint

      # The oracle is the pinned real eslint-plugin-svelte; deps install into an
      # isolated package so the comparison never drifts from what users run.
      - name: Install lint oracle (real eslint-plugin-svelte)
        run: npm --prefix scripts/compat-corpus/lint-oracle install --no-package-lock

      - name: Collect lint corpus
        run: node scripts/compat-corpus/lint-collect.mjs eslint-plugin-svelte svelte-eslint-parser bits-ui flowbite-svelte melt-ui shadcn-svelte

      - name: Verify lint parity (ratchet against lint-known-failures.json)
        run: node scripts/compat-corpus/lint-verify.mjs
