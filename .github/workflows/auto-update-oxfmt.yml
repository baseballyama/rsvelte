name: Auto-update oxfmt

# Auto-follow new `oxfmt` npm releases. `oxfmt` is the engine rsvelte delegates
# inline `<style>` CSS (and standalone md/yaml/toml/html) to, pinned with a
# caret range in the workspace package.json files. When a newer version is
# published on npm than the one pinned, this opens a PR that bumps every caret
# pin, syncs the pinned `oxc_formatter` git revision to that oxfmt release's oxc
# commit (so rsvelte's own JS/TS formatting tracks the delegated oxfmt), and
# refreshes the pnpm lockfile.
#
# Unlike the svelte bump (auto-update-svelte.yml), an oxfmt bump is mechanical
# and the PR is intended to be mergeable once CI is green. An oxfmt change can
# alter inline `<style>` CSS output, so CI (formatter + compatibility report) is
# the gate — review the diff if it surfaces fixture changes.
#
# A minimum release-age gate (RELEASE_AGE_MIN_HOURS) skips versions published
# very recently, mirroring the stability window used for oxfmt elsewhere, so a
# just-published (and potentially yanked) release isn't chased immediately.
#
# SETUP:
#   - Settings → Actions → General → Workflow permissions: enable "Allow GitHub
#     Actions to create and approve pull requests" (required for the default
#     GITHUB_TOKEN to open PRs).
#   - PRs created with the default GITHUB_TOKEN do NOT trigger the `CI` workflow.
#     Add a `GH_PAT` repo secret (fine-grained PAT with `contents: write` +
#     `pull-requests: write`) to have CI run automatically; it falls back to
#     GITHUB_TOKEN when absent.

on:
  workflow_dispatch:
  schedule:
    - cron: '47 5 * * *' # Daily at 05:47 UTC

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-update-oxfmt
  cancel-in-progress: false

env:
  # Skip a release published less than this many hours ago (stability window).
  RELEASE_AGE_MIN_HOURS: '24'

jobs:
  update:
    name: Open oxfmt upgrade PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: false
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      # Needed to regenerate Cargo.lock against the new oxc rev (see the oxc-rev
      # sync step). Resolution only; nothing is compiled here.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.97.1

      - name: Read currently pinned oxfmt version
        id: current
        shell: bash
        run: |
          set -euo pipefail
          # The caret range in the root package.json devDependencies is the
          # source of truth (apps/* mirror it). Strip a leading ^ / ~.
          RANGE=$(jq -r '.devDependencies.oxfmt // .dependencies.oxfmt // empty' package.json)
          if [ -z "${RANGE}" ]; then
            echo "::error::Could not read oxfmt version range from package.json"
            exit 1
          fi
          VERSION=${RANGE#[\^~]}
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Pinned oxfmt version: ${VERSION} (range: ${RANGE})"

      - name: Fetch latest oxfmt release from npm
        id: latest
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://registry.npmjs.org/oxfmt > meta.json
          VERSION=$(jq -r '."dist-tags".latest' meta.json)
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "null" ]; then
            echo "::error::Could not read oxfmt dist-tags.latest from npm"
            exit 1
          fi
          PUBLISHED=$(jq -r --arg v "${VERSION}" '.time[$v] // empty' meta.json)
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "published=${PUBLISHED}" >> "${GITHUB_OUTPUT}"
          echo "Latest oxfmt on npm: ${VERSION} (published ${PUBLISHED})"

      - name: Open upgrade PR if a newer release is available
        if: steps.current.outputs.version != steps.latest.outputs.version
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          CURRENT_VERSION: ${{ steps.current.outputs.version }}
          LATEST_VERSION: ${{ steps.latest.outputs.version }}
          PUBLISHED: ${{ steps.latest.outputs.published }}
        shell: bash
        run: |
          set -euo pipefail

          # Only act when the pinned version is strictly older (version-aware).
          NEWEST=$(printf '%s\n%s\n' "${CURRENT_VERSION}" "${LATEST_VERSION}" | sort -V | tail -n1)
          if [ "${NEWEST}" = "${CURRENT_VERSION}" ]; then
            echo "Pinned ${CURRENT_VERSION} >= latest ${LATEST_VERSION}; nothing to do."
            exit 0
          fi

          # Stability window: skip a release that is younger than the gate.
          if [ -n "${PUBLISHED}" ]; then
            now=$(date -u +%s)
            pub=$(date -u -d "${PUBLISHED}" +%s 2>/dev/null || echo 0)
            if [ "${pub}" -gt 0 ]; then
              age_h=$(( (now - pub) / 3600 ))
              if [ "${age_h}" -lt "${RELEASE_AGE_MIN_HOURS}" ]; then
                echo "oxfmt ${LATEST_VERSION} is only ${age_h}h old (< ${RELEASE_AGE_MIN_HOURS}h gate); waiting."
                exit 0
              fi
            fi
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          pr_branch="chore/update-oxfmt-${LATEST_VERSION}"
          git checkout -B "${pr_branch}"

          # Bump every caret/tilde-pinned oxfmt range across the workspace.
          # The `"oxfmt": "*"` peer entry in apps/npm/fmt is intentionally left
          # untouched (it accepts any installed oxfmt).
          mapfile -t files < <(grep -rl '"oxfmt": *"[\^~][0-9]' --include=package.json . | grep -v node_modules || true)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No caret/tilde-pinned oxfmt entries found to bump"
            exit 1
          fi
          for f in "${files[@]}"; do
            sed -i -E "s|(\"oxfmt\": *\")[\^~][0-9][0-9.]*(\")|\1^${LATEST_VERSION}\2|g" "${f}"
            git add "${f}"
            echo "Bumped ${f}"
          done

          # Sync the pinned oxc revision to the oxc commit this oxfmt release was
          # cut from. rsvelte formats `<script>` / markup JS-TS with `oxc_formatter`
          # (pinned by git rev across the Cargo manifests + the [patch.crates-io]
          # block that unifies every oxc_* dep), so its JS/TS output only tracks the
          # delegated oxfmt when both ride the same oxc commit. oxfmt npm versions
          # map to oxc monorepo tags `oxfmt_v<version>`.
          OXC_SHA=$(gh api "repos/oxc-project/oxc/commits/oxfmt_v${LATEST_VERSION}" \
            --jq '.sha' 2>/dev/null || true)
          if [[ ! "${OXC_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Could not resolve an oxc commit for tag oxfmt_v${LATEST_VERSION}"
            exit 1
          fi
          # All oxc_* deps share one rev (the [patch.crates-io] block aligns them),
          # so read the single current rev and global-replace it in the manifests.
          OLD_SHA=$(grep -hoE 'oxc-project/oxc".*rev = "[0-9a-f]{40}"' Cargo.toml \
            | grep -oE '[0-9a-f]{40}' | sort -u)
          if [ "$(printf '%s' "${OLD_SHA}" | grep -c .)" -ne 1 ]; then
            echo "::error::Expected exactly one pinned oxc rev in Cargo.toml, found: ${OLD_SHA:-<none>}"
            exit 1
          fi
          if [ "${OLD_SHA}" != "${OXC_SHA}" ]; then
            # 1. Repin the git rev across every Cargo manifest (source of truth).
            mapfile -t cargo_files < <(grep -rl "${OLD_SHA}" --include=Cargo.toml . | grep -v node_modules)
            for f in "${cargo_files[@]}"; do
              sed -i "s/${OLD_SHA}/${OXC_SHA}/g" "${f}"
              git add "${f}"
            done

            # 2. The oxc AST/parser crates are consumed via crates.io semver reqs
            #    (`oxc_ast = "X.Y"`) that `[patch.crates-io]` redirects to the git
            #    rev. When a release bumps those crate versions the old req no
            #    longer matches the patched git version, the patch silently stops
            #    applying, and the build ends up with two incompatible oxc copies.
            #    Realign the reqs to the version this commit publishes (read from
            #    the oxc tree; oxc_allocator carries the AST-stack version).
            NEW_OXC_VER=$(gh api \
              "repos/oxc-project/oxc/contents/crates/oxc_allocator/Cargo.toml?ref=${OXC_SHA}" \
              --jq '.content' | base64 -d | grep -m1 -E '^version[[:space:]]*=' \
              | grep -oE '[0-9]+\.[0-9]+')
            OLD_OXC_VER=$(grep -rhoE 'oxc_allocator[^"]*"[0-9]+\.[0-9]+"' crates --include=Cargo.toml \
              | grep -oE '[0-9]+\.[0-9]+' | sort -u | head -n1)
            if [ -n "${NEW_OXC_VER}" ] && [ -n "${OLD_OXC_VER}" ] \
              && [ "${NEW_OXC_VER}" != "${OLD_OXC_VER}" ]; then
              mapfile -t req_files < <(grep -rl "\"${OLD_OXC_VER}\"" crates --include=Cargo.toml)
              for f in "${req_files[@]}"; do
                # Only touch oxc_* dependency lines, never unrelated deps that
                # happen to share the version string.
                sed -i -E "/oxc_/ s/\"${OLD_OXC_VER}\"/\"${NEW_OXC_VER}\"/g" "${f}"
                git add "${f}"
              done
              echo "Bumped oxc crates.io reqs ${OLD_OXC_VER} -> ${NEW_OXC_VER}"
            fi

            # 3. Regenerate the lock via cargo (not sed): sed only swaps the rev
            #    hash and leaves the `version = "x.y.z"` lines stale, which breaks
            #    `cargo build --locked` whenever an oxc release bumps its own crate
            #    versions. Naming the git-sourced crates keeps the refresh scoped so
            #    unrelated registry deps stay pinned. NOTE: this handles the
            #    mechanical repin; a breaking oxc Rust API change still needs a human
            #    source fix, which CI surfaces.
            mapfile -t oxc_pkgs < <(
              awk '/^name = /{n=$3} /oxc-project\/oxc\?rev=/{gsub(/"/,"",n); print n}' Cargo.lock \
                | sort -u
            )
            if [ "${#oxc_pkgs[@]}" -gt 0 ]; then
              cargo update "${oxc_pkgs[@]}"
              git add Cargo.lock
            fi
            echo "Synced oxc rev ${OLD_SHA} -> ${OXC_SHA} (oxfmt_v${LATEST_VERSION})"
          else
            echo "oxc rev already at ${OXC_SHA}; no Cargo change needed."
          fi

          # Refresh the lockfile so CI's --frozen-lockfile install succeeds.
          pnpm install --lockfile-only
          git add pnpm-lock.yaml

          # apps/playground keeps a standalone lockfile (its pnpm-workspace.yaml
          # marker stops pnpm's upward walk), so the repo-root install above never
          # touches it. Refresh it too or the "Playground lockfile" gate fails on
          # the oxfmt specifier mismatch.
          if [ -f apps/playground/pnpm-lock.yaml ]; then
            (cd apps/playground && pnpm install --lockfile-only)
            git add apps/playground/pnpm-lock.yaml
          fi

          title="chore(deps): update oxfmt to ${LATEST_VERSION}"
          git commit -m "${title}"
          git push --force origin "${pr_branch}"

          {
            echo "Automated bump of the \`oxfmt\` npm dependency."
            echo
            echo "| | version |"
            echo "|---|---|"
            echo "| from | \`${CURRENT_VERSION}\` |"
            echo "| to | \`${LATEST_VERSION}\` |"
            echo
            echo "Published: ${PUBLISHED}"
            echo
            echo "\`oxfmt\` is the engine rsvelte delegates inline \`<style>\` CSS"
            echo "(and standalone md/yaml/toml/html) to. A version bump can change"
            echo "CSS formatting output, so **review CI** — the formatter and"
            echo "compatibility-report jobs gate this PR. Merge once green."
            echo
            echo "The pinned \`oxc_formatter\` revision is synced to this oxfmt's"
            echo "oxc commit (\`oxfmt_v${LATEST_VERSION}\` tag) so rsvelte's"
            echo "\`<script>\` / markup JS-TS output tracks the delegated oxfmt."
            echo
            echo "---"
            echo
            echo "Opened by the \`auto-update-oxfmt\` workflow."
          } > pr-body.md

          existing=$(gh pr list --head "${pr_branch}" --state open --json number --jq 'length')
          if [ "${existing}" -eq 0 ]; then
            gh pr create --base main --head "${pr_branch}" \
              --title "${title}" --body-file pr-body.md
          else
            number=$(gh pr list --head "${pr_branch}" --state open --json number --jq '.[0].number')
            gh pr edit "${number}" --title "${title}" --body-file pr-body.md
            echo "Updated existing PR #${number} (force-pushed ${pr_branch})."
          fi
