name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Resolve Svelte submodule SHA
        id: svelte-sha
        shell: bash
        run: echo "sha=$(git submodule status submodules/svelte | awk '{print $1}' | sed 's/^[+-]//')" >> "$GITHUB_OUTPUT"

      - name: Cache fixtures
        uses: actions/cache@v5
        with:
          path: fixtures
          key: fixtures-v2-${{ runner.os }}-${{ steps.svelte-sha.outputs.sha }}-${{ hashFiles('.gitmodules') }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Build Svelte compiler
        run: |
          cd submodules/svelte
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install language-tools deps
        # See .github/workflows/ci.yml for why the svelte-check golden
        # test needs language-tools' workspace symlinks (node_modules/svelte
        # in particular).
        run: |
          cd submodules/language-tools
          pnpm install --frozen-lockfile

      - name: Generate fixtures
        run: pnpm run generate-fixtures
        timeout-minutes: 15

      - name: Generate coverage
        # Skip the coverage instrumentation hit for the SSR / runtime suites if
        # they get too noisy — initially we measure everything, and we can prune
        # in `--ignore-filename-regex` later if needed.
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info \
            --ignore-filename-regex '(tests/|benches/|src/bin/)' \
            -- --test-threads=2
        env:
          RUST_MIN_STACK: '33554432'
          # Match CI's tsc pin; see .github/workflows/ci.yml for the
          # background on why we point at the svelte submodule's TS 5.x.
          TSGO_BIN: ${{ github.workspace }}/submodules/svelte/node_modules/.bin/tsc

      - name: Upload coverage report (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: lcov-coverage
          path: lcov.info
          retention-days: 30

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        if: env.CODECOV_TOKEN != ''
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: lcov.info
          fail_ci_if_error: false
