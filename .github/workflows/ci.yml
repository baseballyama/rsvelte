name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # macOS is dropped from the PR matrix to keep PR feedback fast — it
  # consistently runs ~2x slower than Linux for identical work and the
  # platform-specific failure modes (PATH, line endings, dylib loading)
  # are already covered by `rsvelte_capi` and the `Release` workflow.
  # macOS still runs on every push to `main` and on demand via the
  # `macos-ci` label, so regressions are caught before the next release.
  set-test-matrix:
    name: Set Test matrix
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      os: ${{ steps.matrix.outputs.os }}
    steps:
      - id: matrix
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" \
                || "${{ contains(github.event.pull_request.labels.*.name, 'macos-ci') }}" == "true" ]]; then
            echo 'os=["ubuntu-latest","macos-latest"]' >> "$GITHUB_OUTPUT"
          else
            echo 'os=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Test
    needs: set-test-matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.set-test-matrix.outputs.os) }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Resolve Svelte submodule SHA
        id: svelte-sha
        shell: bash
        run: echo "sha=$(git submodule status submodules/svelte | awk '{print $1}' | sed 's/^[+-]//')" >> "$GITHUB_OUTPUT"

      - name: Cache fixtures
        uses: actions/cache@v5
        with:
          # Fixtures are keyed on the Svelte submodule SHA; if the SHA hasn't
          # changed we can reuse them and skip generation entirely.
          # `hashFiles('submodules/svelte/.git/...')` doesn't work — submodule
          # checkouts leave `submodules/svelte/.git` as a gitlink file
          # pointing at `.git/modules/svelte/`, not a directory the action
          # can hash.
          path: fixtures
          # Bump `v2` to invalidate previously-cached fixtures: the
          # generate-fixtures script now propagates `compileOptions.hmr`
          # from `_config.js`, so any cache pre-dating that change is stale.
          key: fixtures-v2-${{ runner.os }}-${{ steps.svelte-sha.outputs.sha }}-${{ hashFiles('.gitmodules') }}

      - name: Cache Svelte compiler build
        # The Svelte compiler is built identically across CI / Compatibility
        # Report / Coverage / Bench / Deploy Docs. Cache `node_modules` +
        # `packages/svelte/dist` keyed on the submodule SHA + pnpm-lock so
        # cache-hit runs skip the ~1-2 minute `pnpm install && pnpm build`.
        # Includes `node_modules/.bin/tsc`, which is referenced via
        # `TSGO_BIN` below.
        id: svelte-build-cache
        uses: actions/cache@v5
        with:
          path: |
            submodules/svelte/node_modules
            submodules/svelte/packages/svelte/node_modules
            submodules/svelte/packages/svelte/compiler/index.js
            submodules/svelte/packages/svelte/types
            submodules/svelte/packages/svelte/*.d.ts
            submodules/svelte/packages/svelte/scripts/_bundle.js
          key: svelte-build-v2-${{ runner.os }}-${{ steps.svelte-sha.outputs.sha }}-${{ hashFiles('submodules/svelte/pnpm-lock.yaml') }}

      - name: Build Svelte compiler
        if: steps.svelte-build-cache.outputs.cache-hit != 'true'
        run: |
          cd submodules/svelte
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install language-tools deps
        # The svelte-check golden test (tests/svelte_check_golden.rs)
        # runs the rsvelte svelte-check against the upstream test-error
        # fixture. tsc needs `node_modules/svelte` resolvable from the
        # fixture (the svelte2tsx shims `/// <reference types="svelte" />`
        # pull in the package's type definitions). pnpm install at the
        # language-tools root sets up the workspace symlinks that make
        # this work — see also `resolve_svelte2tsx_shims` in
        # src/svelte_check/overlay.rs.
        run: |
          cd submodules/language-tools
          pnpm install --frozen-lockfile

      - name: Generate fixtures
        run: pnpm run generate-fixtures
        timeout-minutes: 15

      - name: Run tests
        # `--all-features` would enable `napi`, which only links cleanly when
        # loaded from Node.js — `cargo test` would otherwise hit `rust-lld:
        # error: undefined symbol: napi_*` on Linux. Default features cover
        # everything we want exercised in CI (native runtime, parallelism).
        run: cargo test
        timeout-minutes: 30
        env:
          # Some fixtures (notably the compatibility_report harness) walk
          # deeply nested ASTs and overflow the default 8 MB thread stack.
          RUST_MIN_STACK: '33554432'
          # Pin svelte-check golden tests to the TS 5.x bundled with the
          # svelte submodule install above. Without this, `which("tsc")`
          # in src/svelte_check/tsgo.rs picks up whatever tsc the runner
          # image preinstalls — on ubuntu-latest that's a TS 6 pre-release
          # that promotes `moduleResolution: "node"` to a hard TS5107
          # error and bails out before emitting the user-source diagnostics
          # the golden test verifies.
          TSGO_BIN: ${{ github.workspace }}/submodules/svelte/node_modules/.bin/tsc

      - name: Collect failure artifacts
        if: failure()
        shell: bash
        run: |
          mkdir -p ci-artifacts
          # Actual outputs written by tests on diff
          if [ -d fixtures ]; then
            find fixtures -type d -name "_actual" -exec cp -R --parents {} ci-artifacts/ \; 2>/dev/null || true
          fi
          # Compatibility report (best-effort; may not exist if tests failed early)
          find fixtures -name "compatibility-report.json" -exec cp --parents {} ci-artifacts/ \; 2>/dev/null || true
          # Manifest for context
          find fixtures -name "manifest.json" -exec cp --parents {} ci-artifacts/ \; 2>/dev/null || true

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failures-${{ matrix.os }}
          path: ci-artifacts
          if-no-files-found: ignore
          retention-days: 14

  compatibility-report:
    name: Compatibility Report
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Resolve Svelte submodule SHA
        id: svelte-sha
        shell: bash
        run: echo "sha=$(git submodule status submodules/svelte | awk '{print $1}' | sed 's/^[+-]//')" >> "$GITHUB_OUTPUT"

      - name: Cache fixtures
        uses: actions/cache@v5
        with:
          path: fixtures
          # Bump `v2` to invalidate previously-cached fixtures: the
          # generate-fixtures script now propagates `compileOptions.hmr`
          # from `_config.js`, so any cache pre-dating that change is stale.
          key: fixtures-v2-${{ runner.os }}-${{ steps.svelte-sha.outputs.sha }}-${{ hashFiles('.gitmodules') }}

      - name: Cache Svelte compiler build
        # See the matching step in the `test` job above.
        id: svelte-build-cache
        uses: actions/cache@v5
        with:
          path: |
            submodules/svelte/node_modules
            submodules/svelte/packages/svelte/node_modules
            submodules/svelte/packages/svelte/compiler/index.js
            submodules/svelte/packages/svelte/types
            submodules/svelte/packages/svelte/*.d.ts
            submodules/svelte/packages/svelte/scripts/_bundle.js
          key: svelte-build-v2-${{ runner.os }}-${{ steps.svelte-sha.outputs.sha }}-${{ hashFiles('submodules/svelte/pnpm-lock.yaml') }}

      - name: Build Svelte compiler
        if: steps.svelte-build-cache.outputs.cache-hit != 'true'
        run: |
          cd submodules/svelte
          pnpm install --frozen-lockfile
          pnpm build

      - name: Generate fixtures
        run: pnpm run generate-fixtures
        timeout-minutes: 15

      - name: Generate compatibility report
        run: pnpm run compatibility-report
        timeout-minutes: 30
        env:
          RUST_MIN_STACK: '33554432'

      - name: Upload compatibility report
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-report-${{ github.sha }}
          path: fixtures/**/compatibility-report.json
          if-no-files-found: warn
          retention-days: 90

      - name: Check README is in sync with Svelte submodule
        run: node scripts/update-docs.mjs --check

      - name: Compare with main (PR only)
        if: github.event_name == 'pull_request'
        run: node scripts/compare-compatibility-reports.mjs --pr-summary > pr-summary.md || echo "comparison unavailable" > pr-summary.md
        continue-on-error: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            let body = '## Compatibility Report\n\n';
            try {
              body += fs.readFileSync('pr-summary.md', 'utf8');
            } catch {
              body += '_Could not generate comparison summary._';
            }
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find((c) =>
              c.user.type === 'Bot' && c.body && c.body.startsWith('## Compatibility Report')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

  # `Build` (`cargo build --release` for the main crate) was removed —
  # release-mode codegen is already exercised by `rsvelte_capi (C ABI)`
  # (Linux/macOS/Windows release builds with the same crate's source) and
  # by the `Release` workflow's `build-svelte-check` / `build-vps-native`
  # matrices, so a standalone PR-time build only repeated work. To restore
  # a pure release-mode smoke test add a `cargo check --release` step here.

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build documentation
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -Dwarnings
