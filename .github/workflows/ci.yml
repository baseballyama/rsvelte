name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  changeset:
    name: Changeset
    # Conventional-commit `fix` / `feat` PRs are user-facing changes that
    # must ship a changeset so the Release workflow can version + changelog
    # them. Other types (chore, docs, refactor, test, ci, build, perf…) are
    # exempt. Add the `skip-changeset` label to bypass for a one-off.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Require changeset for fix/feat PRs
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          SKIP: ${{ contains(github.event.pull_request.labels.*.name, 'skip-changeset') }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$SKIP" == "true" ]]; then
            echo "skip-changeset label present — skipping changeset requirement."
            exit 0
          fi

          # Only `fix` / `feat` (optionally scoped and/or breaking `!`) require a changeset.
          if [[ ! "$PR_TITLE" =~ ^(fix|feat)(\([^\)]*\))?!?: ]]; then
            echo "PR title '$PR_TITLE' is not a fix/feat change — changeset not required."
            exit 0
          fi

          # New changeset markdown files added in this PR (README.md is pre-existing).
          added=$(git diff --name-only --diff-filter=A "$BASE_SHA"...HEAD -- '.changeset/*.md' \
            | grep -vE '\.changeset/README\.md$' || true)

          if [[ -z "$added" ]]; then
            type="${PR_TITLE%%[(:]*}"
            echo "::error::This is a '$type' PR but no changeset was added. Run 'pnpm changeset', describe the change, and commit the generated file under .changeset/. (Add the 'skip-changeset' label to bypass.)"
            exit 1
          fi

          echo "Found changeset(s):"
          echo "$added"

  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    # macOS is dropped from the PR matrix to keep PR feedback fast — it
    # consistently runs ~2x slower than Linux for identical work and the
    # platform-specific failure modes (PATH, line endings, dylib loading) are
    # already covered by `rsvelte_capi` and the `Release` workflow. macOS still
    # runs on every push to `main` and on demand via the `macos-ci` label, so
    # regressions are caught before the next release.
    #
    # The OS list is computed inline rather than in a separate `set-test-matrix`
    # job: that job added a full job's queue + startup (~1 min) to the serial
    # path before any shard could begin. The expression below is evaluated at
    # workflow-parse time, so the shards start immediately. (On a `push` event
    # `github.event.pull_request` is null; `contains(null.*.name, …)` is a
    # well-defined `false`, and the `push` term short-circuits anyway.)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: ${{ (github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'macos-ci')) && fromJSON('["ubuntu-latest","macos-latest"]') || fromJSON('["ubuntu-latest"]') }}
        # This job runs the *fast bulk* of the suite, split across 3 runners.
        # The test *execution* is trivial (~8 s/shard); the wall time is almost
        # entirely compiling+linking the ~159 integration-test binaries against
        # the large `rsvelte_core` rlib. `cargo nextest run` builds *every*
        # binary regardless of which tests a `-E` filter runs, so the old
        # count-partition (split the *run*, build everything 3×) left the build
        # floor — the real bottleneck — paid three times over.
        #
        # `scripts/ci/run-test-shard.sh` instead partitions the *binaries* across
        # shards (cargo target selection from the authoritative `cargo metadata`
        # list), so each shard compiles only its ~1/3 and the per-shard build
        # floor drops roughly 3×. The heaviest single `#[test]` functions — each
        # fans out over 1000+ fixtures internally (runtime legacy/runes, the
        # compile_module thread-safety stress test, the two svelte.dev fmt corpus
        # parity tests at ~100 s each) — still run in their own dedicated jobs
        # (`test-runtime`, `test-thread-safety`, `test-fmt-corpus`). Coverage is
        # unchanged: every test runs in exactly one shard or dedicated job. The
        # `Tests` gate job joins them into one required status check.
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      # Shallow, selective submodule init instead of `submodules: true`: the
      # shards only need `svelte` (build.rs version string + generated fixtures),
      # `language-tools` (svelte2tsx + svelte-check golden tests),
      # `eslint-plugin-svelte` (the `eslint_plugin_oracle` fixtures; it soft-skips
      # when absent, but we keep coverage), and `esrap` (the rsvelte_esrap
      # sample-parity suite). The big unused ones — typescript-go
      # (~534 MB), vize, corsa-bind, and svelte.dev (only the now-removed
      # fmt-corpus step read it) — are skipped, cutting checkout from ~45 s to
      # ~15 s on the macOS runners.
      - name: Checkout needed submodules (shallow)
        run: git submodule update --init --depth 1 submodules/svelte submodules/language-tools submodules/eslint-plugin-svelte submodules/esrap

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # mold is a drop-in faster linker. The test build links ~150 separate
      # integration-test binaries (one per tests/*.rs), so link time is a real
      # chunk of the cold/changed-crate build. `make-default: true` replaces the
      # system `cc` linker transparently, so no RUSTFLAGS change is needed and
      # the rust-cache key is unaffected.
      - name: Setup mold linker
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      # nextest runs every test from every binary in a single global process
      # pool, instead of `cargo test`'s one-binary-at-a-time serial harness —
      # a ~2x wall-clock win on this suite. Installed as a prebuilt binary so
      # there's no compile cost.
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Resolve Svelte submodule SHA
        id: svelte-sha
        shell: bash
        run: echo "sha=$(git submodule status submodules/svelte | awk '{print $1}' | sed 's/^[+-]//')" >> "$GITHUB_OUTPUT"

      - name: Cache fixtures
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          # Fixtures are keyed on the Svelte submodule SHA; if the SHA hasn't
          # changed we can reuse them and skip generation entirely.
          # `hashFiles('submodules/svelte/.git/...')` doesn't work — submodule
          # checkouts leave `submodules/svelte/.git` as a gitlink file
          # pointing at `.git/modules/svelte/`, not a directory the action
          # can hash.
          path: fixtures
          # Bump `v2` to invalidate previously-cached fixtures: the
          # generate-fixtures script now propagates `compileOptions.hmr`
          # from `_config.js`, so any cache pre-dating that change is stale.
          key: fixtures-v2-${{ runner.os }}-${{ steps.svelte-sha.outputs.sha }}-${{ hashFiles('.gitmodules') }}

      - name: Cache Svelte compiler build
        # The Svelte compiler is built identically across CI / Compatibility
        # Report / Coverage / Bench / Deploy Docs. Cache `node_modules` +
        # `packages/svelte/dist` keyed on the submodule SHA + pnpm-lock so
        # cache-hit runs skip the ~1-2 minute `pnpm install && pnpm build`.
        # Includes `node_modules/.bin/tsc`, which is referenced via
        # `TSGO_BIN` below.
        id: svelte-build-cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            submodules/svelte/node_modules
            submodules/svelte/packages/svelte/node_modules
            submodules/svelte/packages/svelte/compiler/index.js
            submodules/svelte/packages/svelte/types
            submodules/svelte/packages/svelte/*.d.ts
            submodules/svelte/packages/svelte/scripts/_bundle.js
          key: svelte-build-v2-${{ runner.os }}-${{ steps.svelte-sha.outputs.sha }}-${{ hashFiles('submodules/svelte/pnpm-lock.yaml') }}

      - name: Build Svelte compiler
        if: steps.svelte-build-cache.outputs.cache-hit != 'true'
        run: |
          cd submodules/svelte
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install language-tools deps
        # The svelte-check golden test (tests/svelte_check_golden.rs)
        # runs the rsvelte svelte-check against the upstream test-error
        # fixture. tsc needs `node_modules/svelte` resolvable from the
        # fixture (the svelte2tsx shims `/// <reference types="svelte" />`
        # pull in the package's type definitions). pnpm install at the
        # language-tools root sets up the workspace symlinks that make
        # this work — see also `resolve_svelte2tsx_shims` in
        # src/svelte_check/overlay.rs.
        run: |
          cd submodules/language-tools
          pnpm install --frozen-lockfile

      - name: Generate fixtures
        run: pnpm run generate-fixtures
        timeout-minutes: 15

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # NOTE: the oxfmt install + svelte.dev formatter-parity corpus generation
      # (~130 s on a cold macOS runner) used to live here, but the only tests
      # that consume `fixtures/fmt-corpus` / `FMT_CORPUS_OXFMT` are
      # `svelte_dev_corpus` / `svelte_dev_markdown` — both excluded from these
      # shards and run in the dedicated `test-fmt-corpus` job, which generates
      # the corpus itself. Generating it here was pure overhead (and a frequent
      # cold-cache stall on the infrequently-run macOS shards), so it's removed.

      - name: Run tests
        # Default features only: `--all-features` would enable `napi`, which only
        # links cleanly when loaded from Node.js (`cargo test` would otherwise hit
        # `rust-lld: error: undefined symbol: napi_*` on Linux). Default features
        # cover everything we exercise in CI (native runtime, parallelism).
        #
        # The script partitions the integration-test *binaries* across shards so
        # each compiles only its ~1/3 (the build, not the run, is the cost here —
        # see the matrix comment and the script header) and applies the
        # dedicated-job exclusion filter. `--lib` unit tests run in the separate
        # `test-unit` job; the heavy fan-outs in `test-runtime` /
        # `test-thread-safety` / `test-fmt-corpus`. `generate_compatibility_report`
        # is `#[ignore]`d (reporting-only) and covered by the
        # `compatibility-report` job. nextest runs no doctests; this workspace has
        # none.
        run: bash scripts/ci/run-test-shard.sh ${{ matrix.shard }} 3
        timeout-minutes: 30
        env:
          # Some fixtures (notably the compatibility_report harness) walk
          # deeply nested ASTs and overflow the default 8 MB thread stack.
          RUST_MIN_STACK: '33554432'
          # Pin svelte-check golden tests to the TS 5.x bundled with the
          # svelte submodule install above. Without this, `which("tsc")`
          # in src/svelte_check/tsgo.rs picks up whatever tsc the runner
          # image preinstalls — on ubuntu-latest that's a TS 6 pre-release
          # that promotes `moduleResolution: "node"` to a hard TS5107
          # error and bails out before emitting the user-source diagnostics
          # the golden test verifies.
          TSGO_BIN: ${{ github.workspace }}/submodules/svelte/node_modules/.bin/tsc

      - name: Collect failure artifacts
        if: failure()
        shell: bash
        run: |
          mkdir -p ci-artifacts
          # Actual outputs written by tests on diff
          if [ -d fixtures ]; then
            find fixtures -type d -name "_actual" -exec cp -R --parents {} ci-artifacts/ \; 2>/dev/null || true
          fi
          # Compatibility report (best-effort; may not exist if tests failed early)
          find fixtures -name "compatibility-report.json" -exec cp --parents {} ci-artifacts/ \; 2>/dev/null || true
          # Manifest for context
          find fixtures -name "manifest.json" -exec cp --parents {} ci-artifacts/ \; 2>/dev/null || true

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-failures-${{ matrix.os }}-shard${{ matrix.shard }}
          path: ci-artifacts
          if-no-files-found: ignore
          retention-days: 14

  # The two heaviest single `#[test]` functions run here, isolated from the
  # `test` shards. Each fans out over 1000+ fixtures internally and takes ~2.5 min
  # to run, so behind the `test` job's full ~2 min workspace build they'd push a
  # shard past the 5 min budget. Running them with a `--test <binary>` selection
  # compiles only their one integration-test binary (deps restored from the
  # shared `test` cache, so no oxc rebuild), so their ~70 s build + ~2.5 min run
  # fits comfortably. They run on Linux only — both exercise OS-agnostic compiler
  # logic that the `test` shards already cover on every OS. Coverage and
  # iteration counts are identical to running them inline.
  test-runtime:
    name: Test runtime
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup mold linker
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Resolve Svelte submodule SHA
        id: svelte-sha
        shell: bash
        run: echo "sha=$(git submodule status submodules/svelte | awk '{print $1}' | sed 's/^[+-]//')" >> "$GITHUB_OUTPUT"

      - name: Cache fixtures
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: fixtures
          key: fixtures-v2-${{ runner.os }}-${{ steps.svelte-sha.outputs.sha }}-${{ hashFiles('.gitmodules') }}

      - name: Cache Svelte compiler build
        id: svelte-build-cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            submodules/svelte/node_modules
            submodules/svelte/packages/svelte/node_modules
            submodules/svelte/packages/svelte/compiler/index.js
            submodules/svelte/packages/svelte/types
            submodules/svelte/packages/svelte/*.d.ts
            submodules/svelte/packages/svelte/scripts/_bundle.js
          key: svelte-build-v2-${{ runner.os }}-${{ steps.svelte-sha.outputs.sha }}-${{ hashFiles('submodules/svelte/pnpm-lock.yaml') }}

      - name: Build Svelte compiler
        if: steps.svelte-build-cache.outputs.cache-hit != 'true'
        run: |
          cd submodules/svelte
          pnpm install --frozen-lockfile
          pnpm build

      - name: Generate fixtures
        run: pnpm run generate-fixtures
        timeout-minutes: 15

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Share the `test` job's dependency cache (same lockfile, same default
          # features) so the oxc graph is restored, not rebuilt. Read-only: this
          # job only builds the `runtime` test binary, so it must not overwrite
          # the full-suite cache the `test` shards populate.
          shared-key: test
          save-if: 'false'

      - name: Run runtime suites (legacy + runes)
        # `--test runtime` builds only crates/rsvelte_core/tests/runtime.rs, so
        # the ~70 s build covers just rsvelte_core + this one binary instead of
        # all ~178 integration-test binaries. The `-E` filter then runs only the
        # two heavy fan-out tests; the binary's lighter tests (hydration, browser,
        # fixture listings) already run in the `test` shards.
        run: >-
          cargo nextest run --profile ci -p rsvelte_core --test runtime
          -E 'test(/test_runtime_legacy/) | test(/test_runtime_runes/)'
        timeout-minutes: 20
        env:
          RUST_MIN_STACK: '33554432'

  test-thread-safety:
    name: Test thread-safety
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      # The thread-safety stress test compiles vendored `tests/fixtures_runed/`
      # modules — no generated fixtures, Svelte build, or Node toolchain needed.
      # Only the `svelte` submodule's package.json is read by rsvelte_core's
      # build.rs for the version string, so a shallow svelte-only init suffices.
      - name: Checkout svelte submodule (shallow)
        run: git submodule update --init --depth 1 submodules/svelte

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup mold linker
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Share (read-only) the `test` job's warm dependency cache.
          shared-key: test
          save-if: 'false'

      - name: Run compile_module thread-safety stress test
        # `--test compile_module_thread_safety` builds only that one binary.
        run: cargo nextest run --profile ci -p rsvelte_core --test compile_module_thread_safety
        timeout-minutes: 15
        env:
          RUST_MIN_STACK: '33554432'

  # The `--lib` (`#[cfg(test)]`) unit tests run here, isolated from the `test`
  # shards (which now build integration-test *binaries* only — see
  # scripts/ci/run-test-shard.sh). Folding the unit tests onto one shard made it
  # build that shard's ~52 integration binaries *plus* every crate's unit-test
  # binary at once, and the extra concurrent links exhausted the runner's memory
  # (linker SIGBUS). A dedicated `--lib` job keeps the three shards uniform and
  # links far fewer binaries here. `--bins` is intentionally omitted: no `[[bin]]`
  # target has a `#[test]`, and `cargo clippy --all-targets` already compile-checks
  # them. The unit tests are pure logic (no generated fixtures / Node / oxfmt), so
  # — like test-thread-safety — only a shallow `svelte` submodule (build.rs version
  # string) is needed.
  test-unit:
    name: Test unit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Checkout svelte submodule (shallow)
        run: git submodule update --init --depth 1 submodules/svelte

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup mold linker
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Share (read-only) the `test` job's warm dependency cache.
          shared-key: test
          save-if: 'false'

      - name: Run workspace unit tests
        run: cargo nextest run --profile ci --lib
        timeout-minutes: 15
        env:
          RUST_MIN_STACK: '33554432'

  # The two svelte.dev formatter-parity corpus tests (~100 s each: they format
  # every .svelte file + markdown code block from svelte.dev and diff against an
  # oxfmt oracle) are the bulk job's other long pole. Isolate them the same way:
  # `--test` selects only their two binaries (deps from the shared `test` cache),
  # and the setup skips the runtime-fixture / Svelte-build steps they don't need.
  test-fmt-corpus:
    name: Test fmt corpus
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      # svelte (rsvelte_core build.rs version string) + svelte.dev (the corpus
      # source files the parity tests read). No Svelte build / generated fixtures.
      - name: Checkout svelte + svelte.dev submodules (shallow)
        run: git submodule update --init --depth 1 submodules/svelte submodules/svelte.dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup mold linker
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install oxfmt for the formatter parity corpus
        # Isolated install (see the matching step in the `test` job) — provides
        # the oxfmt oracle binary used to generate and check the corpus.
        run: |
          mkdir -p "$RUNNER_TEMP/fmt-oracle"
          cd "$RUNNER_TEMP/fmt-oracle"
          npm init -y >/dev/null
          npm i --ignore-scripts oxfmt@0.53.0 svelte@5.56.2
          ./node_modules/.bin/oxfmt --version

      - name: Resolve svelte.dev submodule SHA
        id: svelte-dev-sha
        shell: bash
        run: echo "sha=$(git submodule status submodules/svelte.dev | awk '{print $1}' | sed 's/^[+-]//')" >> "$GITHUB_OUTPUT"

      - name: Cache formatter parity corpus
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: fixtures/fmt-corpus
          key: fmt-corpus-v1-${{ runner.os }}-${{ steps.svelte-dev-sha.outputs.sha }}-${{ hashFiles('scripts/fixtures/fmt-corpus.oxfmtrc.json') }}

      - name: Generate formatter parity corpus
        run: pnpm run generate-fmt-corpus
        timeout-minutes: 15
        env:
          OXFMT_BIN: ${{ runner.temp }}/fmt-oracle/node_modules/.bin/oxfmt

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Share (read-only) the `test` job's warm dependency cache.
          shared-key: test
          save-if: 'false'

      - name: Run svelte.dev formatter-parity corpus tests
        run: >-
          cargo nextest run --profile ci
          -p rsvelte_fmt --test svelte_dev_markdown
          -p rsvelte_formatter --test svelte_dev_corpus
        timeout-minutes: 15
        env:
          RUST_MIN_STACK: '33554432'
          FMT_CORPUS_OXFMT: ${{ runner.temp }}/fmt-oracle/node_modules/.bin/oxfmt

  # Builds the lint wasm (nodejs target) + the native rsvelte-fmt binary, bundles
  # @rsvelte/language-server, and runs its headless LSP smoke tests (formatting
  # matches rsvelte-fmt; diagnostics match the lint wasm) plus the lint→Diagnostic
  # unit tests. Also typechecks + bundles the VS Code extension.
  language-server:
    name: Language server
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      # rsvelte_core's build.rs reads the Svelte version string from the submodule.
      - name: Checkout svelte submodule (shallow)
        run: git submodule update --init --depth 1 submodules/svelte

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup mold linker
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: language-server

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build lint wasm (nodejs target)
        run: pnpm run build:wasm:lint-node

      - name: Build native rsvelte-fmt
        run: cargo build -p rsvelte_fmt --bin rsvelte-fmt

      - name: Build language server
        run: pnpm --filter @rsvelte/language-server run build

      - name: Run language-server tests (headless LSP smoke + unit)
        run: pnpm --filter @rsvelte/language-server run test

      - name: Typecheck + bundle VS Code extension
        run: |
          pnpm --filter rsvelte-vscode run typecheck
          pnpm --filter rsvelte-vscode run build

  # Single required status check that fans the sharded `Test` matrix and the
  # dedicated heavy-test jobs back into one signal: branch protection can require
  # `Tests` instead of every `Test (os, shard)` / `Test runtime` /
  # `Test thread-safety` / `Test fmt corpus` leg, so changing the split never
  # needs a protection-rule change. Fails if any of them failed or was cancelled.
  tests:
    name: Tests
    needs: [test, test-unit, test-runtime, test-thread-safety, test-fmt-corpus]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify all test jobs passed
        shell: bash
        env:
          BULK: ${{ needs.test.result }}
          UNIT: ${{ needs.test-unit.result }}
          RUNTIME: ${{ needs.test-runtime.result }}
          THREAD_SAFETY: ${{ needs.test-thread-safety.result }}
          FMT_CORPUS: ${{ needs.test-fmt-corpus.result }}
        run: |
          echo "test (shards): $BULK"
          echo "test-unit: $UNIT"
          echo "test-runtime: $RUNTIME"
          echo "test-thread-safety: $THREAD_SAFETY"
          echo "test-fmt-corpus: $FMT_CORPUS"
          if [[ "$BULK" != "success" || "$UNIT" != "success" || "$RUNTIME" != "success" || "$THREAD_SAFETY" != "success" || "$FMT_CORPUS" != "success" ]]; then
            echo "::error::One or more test jobs did not succeed."
            exit 1
          fi

  compatibility-report:
    name: Compatibility Report
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Resolve Svelte submodule SHA
        id: svelte-sha
        shell: bash
        run: echo "sha=$(git submodule status submodules/svelte | awk '{print $1}' | sed 's/^[+-]//')" >> "$GITHUB_OUTPUT"

      - name: Cache fixtures
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: fixtures
          # Bump `v2` to invalidate previously-cached fixtures: the
          # generate-fixtures script now propagates `compileOptions.hmr`
          # from `_config.js`, so any cache pre-dating that change is stale.
          key: fixtures-v2-${{ runner.os }}-${{ steps.svelte-sha.outputs.sha }}-${{ hashFiles('.gitmodules') }}

      - name: Cache Svelte compiler build
        # See the matching step in the `test` job above.
        id: svelte-build-cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            submodules/svelte/node_modules
            submodules/svelte/packages/svelte/node_modules
            submodules/svelte/packages/svelte/compiler/index.js
            submodules/svelte/packages/svelte/types
            submodules/svelte/packages/svelte/*.d.ts
            submodules/svelte/packages/svelte/scripts/_bundle.js
          key: svelte-build-v2-${{ runner.os }}-${{ steps.svelte-sha.outputs.sha }}-${{ hashFiles('submodules/svelte/pnpm-lock.yaml') }}

      - name: Build Svelte compiler
        if: steps.svelte-build-cache.outputs.cache-hit != 'true'
        run: |
          cd submodules/svelte
          pnpm install --frozen-lockfile
          pnpm build

      - name: Generate fixtures
        run: pnpm run generate-fixtures
        timeout-minutes: 15

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Generate compatibility report
        run: pnpm run compatibility-report
        timeout-minutes: 30
        env:
          RUST_MIN_STACK: '33554432'

      - name: Upload compatibility report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compatibility-report-${{ github.sha }}
          path: fixtures/**/compatibility-report.json
          if-no-files-found: warn
          retention-days: 90

      - name: Check README is in sync with Svelte submodule
        run: node scripts/dev/update-docs.mjs --check

      - name: Compare with main (PR only)
        if: github.event_name == 'pull_request'
        run: node scripts/diff/compare-compatibility-reports.mjs --pr-summary > pr-summary.md || echo "comparison unavailable" > pr-summary.md
        continue-on-error: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            let body = '## Compatibility Report\n\n';
            try {
              body += fs.readFileSync('pr-summary.md', 'utf8');
            } catch {
              body += '_Could not generate comparison summary._';
            }
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find((c) =>
              c.user.type === 'Bot' && c.body && c.body.startsWith('## Compatibility Report')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

  # `Build` (`cargo build --release` for the main crate) was removed —
  # release-mode codegen is already exercised by `rsvelte_capi (C ABI)`
  # (Linux/macOS/Windows release builds with the same crate's source) and
  # by the `Release` workflow's `build-svelte-check` / `build-vps-native`
  # matrices, so a standalone PR-time build only repeated work. To restore
  # a pure release-mode smoke test add a `cargo check --release` step here.

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build documentation
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -Dwarnings
