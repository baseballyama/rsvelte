name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Resolve Svelte submodule SHA
        id: svelte-sha
        shell: bash
        run: echo "sha=$(git submodule status submodules/svelte | awk '{print $1}' | sed 's/^[+-]//')" >> "$GITHUB_OUTPUT"

      - name: Cache fixtures
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          # Mirrors the cache used by CI (`.github/workflows/ci.yml`) so that
          # the deploy job reuses generated fixtures when the Svelte submodule
          # SHA is unchanged. Keep the key version (`v2`) in sync with CI.
          path: fixtures
          key: fixtures-v2-${{ runner.os }}-${{ steps.svelte-sha.outputs.sha }}-${{ hashFiles('.gitmodules') }}

      - name: Cache Svelte compiler build
        # See the matching step in `.github/workflows/ci.yml`.
        id: svelte-build-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            submodules/svelte/node_modules
            submodules/svelte/packages/svelte/node_modules
            submodules/svelte/packages/svelte/compiler/index.js
            submodules/svelte/packages/svelte/types
            submodules/svelte/packages/svelte/*.d.ts
            submodules/svelte/packages/svelte/scripts/_bundle.js
          key: svelte-build-v2-${{ runner.os }}-${{ steps.svelte-sha.outputs.sha }}-${{ hashFiles('submodules/svelte/pnpm-lock.yaml') }}

      - name: Build Svelte compiler
        # `generate-fixtures` and `compatibility-report` both import directly
        # from the Svelte submodule; its workspace deps (acorn, magic-string,
        # …) must be installed first.
        if: steps.svelte-build-cache.outputs.cache-hit != 'true'
        run: |
          cd submodules/svelte
          pnpm install --frozen-lockfile
          pnpm build

      - name: Generate fixtures
        run: pnpm run generate-fixtures
        timeout-minutes: 15

      - name: Generate compatibility report
        # Writes `fixtures/{svelte-short-commit}/compatibility-report.json`,
        # which `scripts/dev/update-docs.mjs` then converts into
        # `apps/playground/static/test-results.json` for the progress dashboard.
        run: pnpm run compatibility-report
        timeout-minutes: 30
        env:
          RUST_MIN_STACK: '33554432'

      - name: Update docs test-results.json
        run: node scripts/dev/update-docs.mjs

      # NOTE: apps/playground/static/benchmark-results.json is *not* regenerated on
      # every deploy — running the JS-vs-Rust benchmark added ~30 minutes
      # to each Pages publish for numbers that don't move per push.
      # The committed JSON is the source of truth; refresh it locally by
      # running `node scripts/bench/run-benchmark.mjs > apps/playground/static/benchmark-results.json`
      # on a machine with enough cores to exercise the multi-thread path
      # (GitHub-hosted runners top out at low core counts, so they can't
      # show the parallelism gains we care about), then commit the file.

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build --target web --no-default-features --features wasm

      - name: Build NAPI cdylib
        # apps/playground/rsvelte-shim/compiler.mjs loads
        # apps/npm/vite-plugin-svelte-native-<triple>/rsvelte.node at build time so
        # vite-plugin-svelte compiles every .svelte through rsvelte. Ubuntu CI
        # is linux-x64-gnu; the cdylib is named librsvelte_core.so.
        run: cargo build --release --features napi --lib

      - name: Stage NAPI binding
        run: |
          mkdir -p apps/npm/vite-plugin-svelte-native-linux-x64-gnu
          cp target/release/librsvelte_core.so \
             apps/npm/vite-plugin-svelte-native-linux-x64-gnu/rsvelte.node

      - name: Setup pnpm cache for playground
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: apps/playground/pnpm-lock.yaml

      - name: Install playground dependencies
        # `--ignore-workspace` because the repo root became a pnpm workspace
        # (npm/* publishing packages), and without this `pnpm install` walks
        # up to the workspace root and skips installing the playground's own deps.
        working-directory: apps/playground
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Build playground
        working-directory: apps/playground
        # NAPI-on-Linux gotcha: when node `dlopen`s a Rust cdylib with
        # thread_local!s after the process has already started, glibc can't
        # fit the .so's TLS into the static TLS block ("cannot allocate
        # memory in static TLS block"). Forcing the .node to be present in
        # `node`'s LD_PRELOAD makes it part of the initial static TLS block
        # so the dlopen-time growth never happens. We can't set LD_PRELOAD
        # on the whole step — bash itself would then try to load the
        # binding and fail on the napi_* symbols — so we set it only for
        # the node invocation, bypassing `pnpm build`'s shell wrapper.
        run: |
          LD_PRELOAD="${{ github.workspace }}/apps/npm/vite-plugin-svelte-native-linux-x64-gnu/rsvelte.node" \
            node --import ./rsvelte-shim/loader-register.mjs ./node_modules/vite/bin/vite.js build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: apps/playground/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
