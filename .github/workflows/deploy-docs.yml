name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Resolve Svelte submodule SHA
        id: svelte-sha
        shell: bash
        run: echo "sha=$(git submodule status submodules/svelte | awk '{print $1}' | sed 's/^[+-]//')" >> "$GITHUB_OUTPUT"

      - name: Cache fixtures
        uses: actions/cache@v4
        with:
          # Mirrors the cache used by CI (`.github/workflows/ci.yml`) so that
          # the deploy job reuses generated fixtures when the Svelte submodule
          # SHA is unchanged. Keep the key version (`v2`) in sync with CI.
          path: fixtures
          key: fixtures-v2-${{ runner.os }}-${{ steps.svelte-sha.outputs.sha }}-${{ hashFiles('.gitmodules') }}

      - name: Build Svelte compiler
        # `generate-fixtures` and `compatibility-report` both import directly
        # from the Svelte submodule; its workspace deps (acorn, magic-string,
        # …) must be installed first.
        run: |
          cd submodules/svelte
          pnpm install --frozen-lockfile
          pnpm build

      - name: Generate fixtures
        run: pnpm run generate-fixtures
        timeout-minutes: 15

      - name: Generate compatibility report
        # Writes `fixtures/{svelte-short-commit}/compatibility-report.json`,
        # which `scripts/update-docs.mjs` then converts into
        # `docs/static/test-results.json` for the progress dashboard.
        run: pnpm run compatibility-report
        timeout-minutes: 30
        env:
          RUST_MIN_STACK: '33554432'

      - name: Update docs test-results.json
        run: node scripts/update-docs.mjs

      - name: Build language-tools svelte2tsx
        # `scripts/run-benchmark.mjs` imports
        # submodules/language-tools/packages/svelte2tsx/index.mjs as the
        # JS baseline. That file is a rollup build artefact, not checked
        # into upstream — so we install workspace deps and run the
        # package's build before invoking the benchmark.
        run: |
          cd submodules/language-tools
          pnpm install --frozen-lockfile
          cd packages/svelte2tsx
          pnpm build

      - name: Run JS vs Rust benchmark
        # Refreshes docs/static/benchmark-results.json so the /benchmark
        # page on the deployed site reflects current main rather than
        # whatever was last hand-committed. Mirrors the compatibility-
        # report flow: regenerated on every deploy, bundled into
        # docs/build by the subsequent docs build step.
        run: node scripts/run-benchmark.mjs > docs/static/benchmark-results.json
        timeout-minutes: 30

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build --target web --no-default-features --features wasm

      - name: Build NAPI cdylib
        # docs/rsvelte-shim/compiler.mjs loads
        # npm/vite-plugin-svelte-native-<triple>/rsvelte.node at build time so
        # vite-plugin-svelte compiles every .svelte through rsvelte. Ubuntu CI
        # is linux-x64-gnu; the cdylib is named libsvelte_compiler_rust.so.
        run: cargo build --release --features napi --lib

      - name: Stage NAPI binding
        run: |
          mkdir -p npm/vite-plugin-svelte-native-linux-x64-gnu
          cp target/release/libsvelte_compiler_rust.so \
             npm/vite-plugin-svelte-native-linux-x64-gnu/rsvelte.node

      - name: Setup pnpm cache for docs
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install docs dependencies
        # `--ignore-workspace` because the repo root became a pnpm workspace
        # (npm/* publishing packages), and without this `pnpm install` walks
        # up to the workspace root and skips installing docs/'s own deps.
        working-directory: docs
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Build docs
        working-directory: docs
        # NAPI-on-Linux gotcha: when node `dlopen`s a Rust cdylib with
        # thread_local!s after the process has already started, glibc can't
        # fit the .so's TLS into the static TLS block ("cannot allocate
        # memory in static TLS block"). Forcing the .node to be present in
        # `node`'s LD_PRELOAD makes it part of the initial static TLS block
        # so the dlopen-time growth never happens. We can't set LD_PRELOAD
        # on the whole step — bash itself would then try to load the
        # binding and fail on the napi_* symbols — so we set it only for
        # the node invocation, bypassing `pnpm build`'s shell wrapper.
        run: |
          LD_PRELOAD="${{ github.workspace }}/npm/vite-plugin-svelte-native-linux-x64-gnu/rsvelte.node" \
            node --import ./rsvelte-shim/loader-register.mjs ./node_modules/vite/bin/vite.js build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
