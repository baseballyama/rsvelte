name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: false

      # Only the `svelte` submodule is needed now that fixtures / the
      # compatibility report no longer run here: rsvelte_core's build.rs reads
      # submodules/svelte/packages/svelte/package.json to embed the version
      # string into the NAPI cdylib. The other submodules (language-tools,
      # typescript-go — ~534 MB combined, plus the SSH-only vite-plugin-svelte
      # remote) are never touched by the WASM / NAPI / playground build, so a
      # shallow svelte-only init keeps checkout fast (mirrors rsvelte-capi.yml).
      - name: Checkout svelte submodule (shallow)
        run: git submodule update --init --depth 1 submodules/svelte

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      # NOTE: the docs dashboard's `apps/playground/static/test-results.json`
      # is the *committed* file — it is NOT regenerated here. Regenerating it
      # meant running the full `compatibility-report` harness (~4 min, plus
      # fixture generation + a Svelte-compiler build) on every Pages publish,
      # purely to refresh a JSON that the dedicated `Compatibility Report` CI
      # job already produces on the same push to `main`. Deploying docs only
      # needs to *build* the site, so the report is decoupled: refresh the
      # dashboard data locally with `pnpm run test-and-update` and commit
      # `apps/playground/static/test-results.json` (same flow as the
      # benchmark JSON below).

      # NOTE: apps/playground/static/benchmark-results.json is *not* regenerated on
      # every deploy — running the JS-vs-Rust benchmark added ~30 minutes
      # to each Pages publish for numbers that don't move per push.
      # The committed JSON is the source of truth; refresh it locally by
      # running `node scripts/bench/run-benchmark.mjs > apps/playground/static/benchmark-results.json`
      # on a machine with enough cores to exercise the multi-thread path
      # (GitHub-hosted runners top out at low core counts, so they can't
      # show the parallelism gains we care about), then commit the file.

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (compiler + svelte2tsx + lint)
        # Built from rsvelte_lint, which links rsvelte_core's compiler +
        # svelte2tsx wasm exports transitively and adds the `lint` export that
        # powers the playground's Lint tab.
        run: wasm-pack build crates/rsvelte_lint --out-dir ../../pkg --target web --no-default-features --features wasm

      - name: Build WASM (formatter)
        # Powers the playground's `fmt` tool. Separate crate (rsvelte_fmt_wasm)
        # so the formatter's wasm backend links without re-exporting
        # rsvelte_core's own #[wasm_bindgen] symbols. Output → pkg-fmt/.
        run: wasm-pack build crates/rsvelte_fmt_wasm --out-dir ../../pkg-fmt --target web

      - name: Build NAPI cdylib
        # apps/playground/rsvelte-shim/compiler.mjs loads
        # apps/npm/vite-plugin-svelte-native-<triple>/rsvelte.node at build time so
        # vite-plugin-svelte compiles every .svelte through rsvelte. Ubuntu CI
        # is linux-x64-gnu; the cdylib is named librsvelte_core.so.
        run: cargo build --release --features napi --lib

      - name: Stage NAPI binding
        run: |
          mkdir -p apps/npm/vite-plugin-svelte-native-linux-x64-gnu
          cp target/release/librsvelte_core.so \
             apps/npm/vite-plugin-svelte-native-linux-x64-gnu/rsvelte.node

      - name: Setup pnpm cache for playground
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: apps/playground/pnpm-lock.yaml

      - name: Install playground dependencies
        # `--ignore-workspace` because the repo root became a pnpm workspace
        # (npm/* publishing packages), and without this `pnpm install` walks
        # up to the workspace root and skips installing the playground's own deps.
        working-directory: apps/playground
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Build playground
        working-directory: apps/playground
        # NAPI-on-Linux gotcha: when node `dlopen`s a Rust cdylib with
        # thread_local!s after the process has already started, glibc can't
        # fit the .so's TLS into the static TLS block ("cannot allocate
        # memory in static TLS block"). Forcing the .node to be present in
        # `node`'s LD_PRELOAD makes it part of the initial static TLS block
        # so the dlopen-time growth never happens. We can't set LD_PRELOAD
        # on the whole step — bash itself would then try to load the
        # binding and fail on the napi_* symbols — so we set it only for
        # the node invocation, bypassing `pnpm build`'s shell wrapper.
        run: |
          LD_PRELOAD="${{ github.workspace }}/apps/npm/vite-plugin-svelte-native-linux-x64-gnu/rsvelte.node" \
            node --import ./rsvelte-shim/loader-register.mjs ./node_modules/vite/bin/vite.js build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: apps/playground/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
