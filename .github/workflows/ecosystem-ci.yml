name: ecosystem-ci

# Verifies rsvelte against real-world MIT-licensed Svelte projects by running
# each target's own test/build suite under (1) the official svelte/compiler
# (baseline) and (2) rsvelte (swap). See compat/ecosystem-ci/README.md for design.
#
# Triggers:
#   - workflow_dispatch: manual run, optional `target` input selects one target
#   - PR with label `ecosystem-ci`: opt-in verification for a rsvelte change
#   - schedule: nightly full sweep

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Single target to run (empty = all)'
        required: false
        type: string
      tag:
        description: 'Tag filter (e.g. "ui-library"). Ignored if target is set.'
        required: false
        type: string
  pull_request:
    types: [labeled, synchronize]
  schedule:
    # Nightly at 02:00 UTC. Adjust if the matrix grows past 4–5 targets.
    - cron: '0 2 * * *'

# Scope the concurrency group by the dispatched target/tag so that the poll
# workflow's per-target dispatches do not cancel each other (each changed
# target is a separate run). Re-dispatching the SAME target still supersedes
# its in-flight run. Schedule (full sweep) and PR runs fall back to the event
# name, keeping their existing "latest wins per ref" behaviour.
concurrency:
  group: ecosystem-ci-${{ github.ref }}-${{ github.event.inputs.target || github.event.inputs.tag || github.event_name }}
  cancel-in-progress: true

jobs:
  discover:
    name: Discover targets
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ecosystem-ci'))
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.list.outputs.targets }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Compute target matrix
        id: list
        shell: bash
        run: |
          set -euo pipefail
          INPUT_TARGET='${{ github.event.inputs.target }}'
          INPUT_TAG='${{ github.event.inputs.tag }}'
          if [ -n "$INPUT_TARGET" ]; then
            # Explicit single-target dispatch — run it even if disabled, so
            # we can investigate disabled targets on demand.
            targets=$(printf '%s' "$INPUT_TARGET" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            # Skip targets marked `disabled: true` in the JSON. They stay
            # checked in for visibility (and re-enable via dispatch input).
            all=()
            for f in $(find compat/ecosystem-ci/targets -name '*.json' | sort); do
              name=$(basename "$f" .json)
              if jq -e '.disabled == true' "$f" > /dev/null; then continue; fi
              all+=("$name")
            done
            if [ -n "$INPUT_TAG" ]; then
              filtered=()
              for t in "${all[@]}"; do
                if jq -e --arg tag "$INPUT_TAG" '.tags | index($tag)' "compat/ecosystem-ci/targets/${t}.json" > /dev/null; then
                  filtered+=("$t")
                fi
              done
              targets=$(printf '%s\n' "${filtered[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            else
              targets=$(printf '%s\n' "${all[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            fi
          fi
          echo "targets=$targets" >> "$GITHUB_OUTPUT"
          echo "Targets: $targets"

  run:
    name: ${{ matrix.target }}
    needs: discover
    if: needs.discover.outputs.targets != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.discover.outputs.targets) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Init vite-plugin-svelte submodule (only one ecosystem-ci needs)
        # The fork's submodule URL in .gitmodules is the maintainer's SSH URL
        # (git@github.com:.../vite-plugin-svelte.git). CI runners don't have
        # that SSH key, so rewrite .gitmodules to HTTPS in-place before init.
        # (`git config submodule.<n>.url` doesn't survive `submodule init`,
        # which re-reads .gitmodules and re-registers the SSH URL.)
        run: |
          sed -i 's|git@github.com:baseballyama/vite-plugin-svelte|https://github.com/baseballyama/vite-plugin-svelte|' .gitmodules
          git submodule sync submodules/vite-plugin-svelte
          git submodule update --init submodules/vite-plugin-svelte

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # `matrix.target` is the external repo under test, not a Rust target —
      # every matrix leg builds the same host napi binding, so share one
      # cache across them instead of fragmenting per target.
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ecosystem

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Run ecosystem-ci
        run: node scripts/ecosystem/ecosystem-ci.mjs run "${{ matrix.target }}"

      - name: Upload result JSON
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: result-${{ matrix.target }}
          path: compat/ecosystem-ci/results/${{ matrix.target }}.json
          if-no-files-found: warn

      - name: Upload phase logs
        # Always upload — success paths can still have useful diagnostic
        # output (e.g. baseline build that ran in 1.3s and silently
        # produced an empty node_modules, which only surfaces if you can
        # read the install log).
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: logs-${{ matrix.target }}
          path: compat/ecosystem-ci/.cache/${{ matrix.target }}-*.log
          if-no-files-found: warn

  summary:
    name: Summary
    needs: run
    # Skip on `skipped` (nothing ran) and `cancelled` (superseded by a newer
    # run via concurrency, or manually aborted — not a real failure). This
    # avoids spurious failure issues (see issue #729).
    if: always() && needs.run.result != 'skipped' && needs.run.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      # Required to comment on the PR below: GITHUB_TOKEN is a GitHub App token,
      # and posting to a PR conversation needs `pull-requests: write` even though
      # the API path is /issues/comments (`issues: write` alone yields
      # "Resource not accessible by integration").
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download all result artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: compat/ecosystem-ci/results
          pattern: result-*
          merge-multiple: true

      - name: Aggregate
        run: node scripts/ecosystem/ecosystem-ci.mjs report | tee summary.md

      - name: Post summary to PR
        if: github.event_name == 'pull_request'
        # Cosmetic: a comment-permission hiccup must never red the whole sweep —
        # the verdict lives in the result-* artifacts and this job's log.
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('summary.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## ecosystem-ci results\n\n' + body,
            });

      # Maintain a rolling history issue (label `ecosystem-ci-history`) and
      # open a new failure issue (label `ecosystem-ci-failure`) when this run
      # has any non-pass target. Skipped for pull_request runs — PRs already
      # get an inline summary comment above. See scripts/ecosystem/ecosystem-ci-issues.mjs.
      - name: Update history / failure issues
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          MATRIX_RESULT: ${{ needs.run.result }}
          DISPATCH_TARGET: ${{ github.event.inputs.target }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
        run: node scripts/ecosystem/ecosystem-ci-issues.mjs
