[package]
name = "rsvelte_fmt"
version = "0.1.0"
edition = "2024"
rust-version = "1.90"
description = "Fast Svelte + JS/TS/CSS formatter — dispatches .svelte to rsvelte_formatter and other files to oxfmt"
license = "MIT"
publish = false

[[bin]]
name = "rsvelte-fmt"
path = "src/main.rs"

[dependencies]
rsvelte_formatter = { path = "../rsvelte_formatter" }
oxc_formatter = { git = "https://github.com/oxc-project/oxc", rev = "187e1a52c1e16c43c50c435579e1e2c2173e690f" }
oxc_formatter_core = { git = "https://github.com/oxc-project/oxc", rev = "600cd6f40087e9f0453a73f48e4a33306265e50c" }
clap = { version = "4.5", features = ["derive"] }
walkdir = "2.5"
rayon = "1.10"
anyhow = "1.0"
