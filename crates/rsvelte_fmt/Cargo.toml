[package]
name = "rsvelte_fmt"
version = "0.1.0"
edition = "2024"
rust-version = "1.90"
description = "Fast Svelte + JS/TS/CSS formatter — dispatches .svelte to rsvelte_formatter and other files to oxfmt"
license = "MIT"
publish = false

[[bin]]
name = "rsvelte-fmt"
path = "src/main.rs"

[dependencies]
rsvelte_formatter = { path = "../rsvelte_formatter" }
oxc_formatter = { git = "https://github.com/oxc-project/oxc", rev = "a8cb7d6cbc22241e347d3811ab209f55e72fa867" }
oxc_formatter_core = { git = "https://github.com/oxc-project/oxc", rev = "3d13e293e4e24c91eb2958df493245c85f7087bd" }
clap = { version = "4.5", features = ["derive"] }
walkdir = "2.5"
rayon = "1.10"
anyhow = "1.0"
