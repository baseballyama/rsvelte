[package]
name = "rsvelte_fmt"
version = "0.1.0"
edition = "2024"
rust-version = "1.90"
description = "Fast Svelte + JS/TS/CSS formatter — dispatches .svelte to rsvelte_formatter and other files to oxfmt"
license = "MIT"
publish = false

[[bin]]
name = "rsvelte-fmt"
path = "src/main.rs"

[dependencies]
rsvelte_formatter = { path = "../rsvelte_formatter" }
oxc_formatter = { git = "https://github.com/oxc-project/oxc", rev = "f88961ae2968ae2a12035111d07c72797812d2fd" }
oxc_formatter_core = { git = "https://github.com/oxc-project/oxc", rev = "f6f0fbf5d9a565a46031166c835dbe56b875ac3a" }
clap = { version = "4.5", features = ["derive"] }
walkdir = "2.5"
rayon = "1.10"
anyhow = "1.0"
