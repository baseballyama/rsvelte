[package]
name = "rsvelte_formatter"
version = "0.1.0"
edition = "2024"
rust-version = "1.90"
description = "Fast Svelte 5 formatter built on rsvelte + oxc_formatter"
license = "MIT"
publish = false

[lib]
crate-type = ["rlib"]

[dependencies]
rsvelte_core = { path = "../rsvelte_core", default-features = false, features = ["native"] }
oxc_allocator = "0.134"
oxc_ast = "0.134"
oxc_parser = "0.134"
oxc_span = "0.134"
oxc_formatter = { git = "https://github.com/oxc-project/oxc", rev = "187e1a52c1e16c43c50c435579e1e2c2173e690f" }
oxc_formatter_core = { git = "https://github.com/oxc-project/oxc", rev = "187e1a52c1e16c43c50c435579e1e2c2173e690f" }
thiserror = "2.0"
