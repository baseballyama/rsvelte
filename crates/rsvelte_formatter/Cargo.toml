[package]
name = "rsvelte_formatter"
version = "0.1.0"
edition = "2024"
rust-version = "1.90"
description = "Fast Svelte 5 formatter built on rsvelte + oxc_formatter"
license = "MIT"
publish = false

[lib]
crate-type = ["rlib"]

[dependencies]
rsvelte_core = { path = "../rsvelte_core", default-features = false, features = ["native"] }
oxc_allocator = "0.134"
oxc_ast = "0.134"
oxc_parser = "0.134"
oxc_span = "0.134"
oxc_formatter = { git = "https://github.com/oxc-project/oxc", rev = "f6f0fbf5d9a565a46031166c835dbe56b875ac3a" }
oxc_formatter_core = { git = "https://github.com/oxc-project/oxc", rev = "f88961ae2968ae2a12035111d07c72797812d2fd" }
thiserror = "2.0"
